<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Strudel</title>

        <!-- Strudel & Marked -->
        <script src="https://unpkg.com/@strudel/repl@1.0.2"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <!-- Bootstrap & Icons -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />

        <!-- Custom CSS -->
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="split-layout">
            <!-- LEFT PANEL: Markdown Viewer -->
            <div class="markdown-panel">
                <div class="markdown-header">
                    <div class="file-info">
                        <i class="bi bi-file-earmark-markdown"></i> STRUDEL.MD
                    </div>
                    <div class="file-badge">
                        <i class="bi bi-folder"></i>
                    </div>
                </div>
                <div id="markdown-content" class="markdown-content">
                    <div class="loading-indicator">
                        <i class="bi bi-arrow-repeat me-2"></i> Loading
                        strudel.md...
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: Editor -->
            <div class="editor-panel">
                <div class="editor-header">
                    <div>
                        <i class="bi bi-code-slash"></i>
                        <span class="brand">Strudel</span> CODE
                    </div>
                    <div>
                        <button class="play-button" id="run-all-btn">
                            <i class="bi bi-play-fill"></i> Run
                        </button>
                    </div>
                </div>

                <div class="editor-container">
                    <div class="editor-tabs">
                        <div>
                            <span class="editor-tab active">
                                <i class="bi bi-file-code"></i> Strudel Editor
                            </span>
                        </div>
                        <div><kbd>Ctrl</kbd>+<kbd>Enter</kbd> Run</div>
                        <div><kbd>Ctrl</kbd>+<kbd>.</kbd> Stop</div>
                    </div>

                    <!-- Single Editor Instance -->
                    <strudel-editor id="main-editor"></strudel-editor>
                </div>
            </div>
        </div>

        <script src="index.js" defer></script>
    </body>
</html>
