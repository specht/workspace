<script>
    let hpadding = 10;
    let vpadding = 10;
    let margin = 10;
    let width = 128;
    let height = 128;

    let base1 = [1.0, 0.0, 0.0, 0];
    let base2 = [0.0, 1.0, 0.0, 0];
    let base3 = [0.0, 0.0, 1.0, 0];
    // YCbCr:
    // base1 = [0.299, 0.587, 0.114, 16];
    // base2 = [-0.169, -0.331, 0.5, 128];
    // base3 = [0.5, -0.419, -0.081, 128];

    let inverseBasis = null;

    const viewState = {
        zoom: 1,
        minZoom: 1,
        maxZoom: 64,
        cx: 0,
        cy: 0
    };

    const channelSettings = [
        { mode: 'gaussian', amount: 0 },
        { mode: 'gaussian', amount: 0 },
        { mode: 'gaussian', amount: 0 },
    ];

    let channelStats = {
        c1: 0,
        c2: 0,
        c3: 0,
        c1m: 0,
        c2m: 0,
        c3m: 0
    };

    let imageSimilarityPercent = 100;
    let meanDeltaE = 0;

    const viewIds = ['source', 'c1', 'c2', 'c3', 'c1m', 'c2m', 'c3m', 'result'];

    const buffers = {
        source: document.createElement('canvas'),
        c1: document.createElement('canvas'),
        c2: document.createElement('canvas'),
        c3: document.createElement('canvas'),
        c1m: document.createElement('canvas'),
        c2m: document.createElement('canvas'),
        c3m: document.createElement('canvas'),
        result: document.createElement('canvas')
    };

    const bufferContexts = {};
    const visibleContexts = {};

    let sourcePixels = null;
    let sourceImageData = null;

    let ch1 = null, ch2 = null, ch3 = null;
    let ch1m = null, ch2m = null, ch3m = null;

    let c1ImageData = null;
    let c2ImageData = null;
    let c3ImageData = null;
    let c1mImageData = null;
    let c2mImageData = null;
    let c3mImageData = null;
    let resultImageData = null;

    let blurTmp1 = null;
    let blurTmp2 = null;
    let blurTmp3 = null;
    const gaussianKernelCache = new Map();

    let pipelineQueued = false;
    let renderQueued = false;
    let metricsTimer = null;

    let decomposeDirty = true;
    let filterDirty = true;
    let resultDirty = true;
    let statsDirty = true;
    let displayDirty = true;
    let labelsDirty = true;
    let metricsDirty = true;

    const pointers = new Map();
    let gesture = null;

    function clamp255(x) {
        return x < 0 ? 0 : x > 255 ? 255 : x | 0;
    }

    function determinant3x3(v1, v2, v3) {
        return (
            v1[0] * (v2[1] * v3[2] - v2[2] * v3[1]) -
            v1[1] * (v2[0] * v3[2] - v2[2] * v3[0]) +
            v1[2] * (v2[0] * v3[1] - v2[1] * v3[0])
        );
    }

    function inverseMatrix3x3(v1, v2, v3) {
        const det = determinant3x3(v1, v2, v3);
        if (Math.abs(det) < 1e-10) return null;

        return [
            [
                (v2[1] * v3[2] - v2[2] * v3[1]) / det,
                (v1[2] * v3[1] - v1[1] * v3[2]) / det,
                (v1[1] * v2[2] - v1[2] * v2[1]) / det
            ],
            [
                (v2[2] * v3[0] - v2[0] * v3[2]) / det,
                (v1[0] * v3[2] - v1[2] * v3[0]) / det,
                (v1[2] * v2[0] - v1[0] * v2[2]) / det
            ],
            [
                (v2[0] * v3[1] - v2[1] * v3[0]) / det,
                (v1[1] * v3[0] - v1[0] * v3[1]) / det,
                (v1[0] * v2[1] - v1[1] * v2[0]) / det
            ]
        ];
    }

    function updateInverseBasis() {
        inverseBasis = inverseMatrix3x3(base1, base2, base3);
        if (!inverseBasis) {
            throw new Error('Basis vectors are not invertible.');
        }
    }

    function applyBasis(r, g, b, base) {
        return r * base[0] + g * base[1] + b * base[2] + base[3];
    }

    function gaussianKernel1D(radius) {
        if (radius <= 0) return [1];

        const sigma = Math.max(radius / 2, 0.8);
        const size = radius * 2 + 1;
        const kernel = new Float32Array(size);
        let sum = 0;

        for (let i = -radius; i <= radius; i++) {
            const v = Math.exp(-(i * i) / (2 * sigma * sigma));
            kernel[i + radius] = v;
            sum += v;
        }

        for (let i = 0; i < size; i++) {
            kernel[i] /= sum;
        }

        return kernel;
    }

    function getGaussianKernel(radius) {
        if (!gaussianKernelCache.has(radius)) {
            gaussianKernelCache.set(radius, gaussianKernel1D(radius));
        }
        return gaussianKernelCache.get(radius);
    }

    function ensureWorkingBuffers() {
        const n = width * height;

        ch1 = new Uint8ClampedArray(n);
        ch2 = new Uint8ClampedArray(n);
        ch3 = new Uint8ClampedArray(n);

        ch1m = new Uint8ClampedArray(n);
        ch2m = new Uint8ClampedArray(n);
        ch3m = new Uint8ClampedArray(n);

        blurTmp1 = new Float32Array(n);
        blurTmp2 = new Float32Array(n);
        blurTmp3 = new Float32Array(n);

        c1ImageData = new ImageData(width, height);
        c2ImageData = new ImageData(width, height);
        c3ImageData = new ImageData(width, height);

        c1mImageData = new ImageData(width, height);
        c2mImageData = new ImageData(width, height);
        c3mImageData = new ImageData(width, height);

        resultImageData = new ImageData(width, height);
    }

    function fillGrayImageData(gray, imageData) {
        const dst = imageData.data;
        const n = gray.length;
        for (let p = 0, i = 0; p < n; p++, i += 4) {
            const v = gray[p];
            dst[i] = v;
            dst[i + 1] = v;
            dst[i + 2] = v;
            dst[i + 3] = 255;
        }
    }

    function decomposeChannels() {
        if (!sourcePixels) return;

        const src = sourcePixels;
        const n = width * height;
        const b1 = base1;
        const b2 = base2;
        const b3 = base3;

        for (let p = 0, i = 0; p < n; p++, i += 4) {
            const r = src[i];
            const g = src[i + 1];
            const b = src[i + 2];

            ch1[p] = clamp255(applyBasis(r, g, b, b1) + 0.5);
            ch2[p] = clamp255(applyBasis(r, g, b, b2) + 0.5);
            ch3[p] = clamp255(applyBasis(r, g, b, b3) + 0.5);
        }
    }

    function gaussianBlurGrayArray(src, dst, tmp, w, h, radius) {
        radius = Math.max(0, Math.floor(radius));
        if (radius <= 0) {
            dst.set(src);
            return;
        }

        const kernel = getGaussianKernel(radius);

        for (let y = 0; y < h; y++) {
            const row = y * w;
            for (let x = 0; x < w; x++) {
                let sum = 0;
                for (let k = -radius; k <= radius; k++) {
                    let xx = x + k;
                    if (xx < 0) xx = 0;
                    else if (xx >= w) xx = w - 1;
                    sum += src[row + xx] * kernel[k + radius];
                }
                tmp[row + x] = sum;
            }
        }

        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                let sum = 0;
                for (let k = -radius; k <= radius; k++) {
                    let yy = y + k;
                    if (yy < 0) yy = 0;
                    else if (yy >= h) yy = h - 1;
                    sum += tmp[yy * w + x] * kernel[k + radius];
                }
                dst[y * w + x] = clamp255(sum + 0.5);
            }
        }
    }

    function pixelateGrayArray(src, dst, w, h, blockSize) {
        blockSize = Math.max(1, Math.floor(blockSize));
        if (blockSize <= 1) {
            dst.set(src);
            return;
        }

        for (let by = 0; by < h; by += blockSize) {
            for (let bx = 0; bx < w; bx += blockSize) {
                let sum = 0;
                let count = 0;

                const yEnd = Math.min(by + blockSize, h);
                const xEnd = Math.min(bx + blockSize, w);

                for (let y = by; y < yEnd; y++) {
                    const row = y * w;
                    for (let x = bx; x < xEnd; x++) {
                        sum += src[row + x];
                        count++;
                    }
                }

                const v = clamp255(sum / count + 0.5);

                for (let y = by; y < yEnd; y++) {
                    const row = y * w;
                    for (let x = bx; x < xEnd; x++) {
                        dst[row + x] = v;
                    }
                }
            }
        }
    }

    function downsampleGrayArrayBox(src, dst, w, h, factor) {
        factor = Math.max(1, Math.floor(factor));
        const rw = Math.max(1, Math.ceil(w / factor));
        const rh = Math.max(1, Math.ceil(h / factor));

        for (let ry = 0; ry < rh; ry++) {
            const sy0 = ry * factor;
            const sy1 = Math.min(sy0 + factor, h);

            for (let rx = 0; rx < rw; rx++) {
                const sx0 = rx * factor;
                const sx1 = Math.min(sx0 + factor, w);

                let sum = 0;
                let count = 0;

                for (let y = sy0; y < sy1; y++) {
                    const row = y * w;
                    for (let x = sx0; x < sx1; x++) {
                        sum += src[row + x];
                        count++;
                    }
                }

                dst[ry * rw + rx] = count ? (sum / count) : 0;
            }
        }

        return { rw, rh };
    }

    function bilinearSampleGray(src, rw, rh, x, y) {
        const x0 = Math.floor(x);
        const y0 = Math.floor(y);
        const x1 = x0 + 1;
        const y1 = y0 + 1;

        const cx0 = Math.max(0, Math.min(rw - 1, x0));
        const cy0 = Math.max(0, Math.min(rh - 1, y0));
        const cx1 = Math.max(0, Math.min(rw - 1, x1));
        const cy1 = Math.max(0, Math.min(rh - 1, y1));

        const tx = x - x0;
        const ty = y - y0;

        const p00 = src[cy0 * rw + cx0];
        const p10 = src[cy0 * rw + cx1];
        const p01 = src[cy1 * rw + cx0];
        const p11 = src[cy1 * rw + cx1];

        const a = p00 * (1 - tx) + p10 * tx;
        const b = p01 * (1 - tx) + p11 * tx;
        return a * (1 - ty) + b * ty;
    }

    function subsampleGrayArray(src, dst, w, h, factor) {
        factor = Math.max(1, Math.floor(factor));
        if (factor <= 1) {
            dst.set(src);
            return;
        }

        const rw = Math.max(1, Math.ceil(w / factor));
        const rh = Math.max(1, Math.ceil(h / factor));
        const reduced = new Float32Array(rw * rh);

        downsampleGrayArrayBox(src, reduced, w, h, factor);

        for (let y = 0; y < h; y++) {
            const sy = ((y + 0.5) / factor) - 0.5;

            for (let x = 0; x < w; x++) {
                const sx = ((x + 0.5) / factor) - 0.5;
                dst[y * w + x] = clamp255(bilinearSampleGray(reduced, rw, rh, sx, sy) + 0.5);
            }
        }
    }

    function filterGrayArray(src, dst, tmp, w, h, settings) {
        if (!settings || settings.mode === 'none' || settings.amount <= 0) {
            dst.set(src);
            return;
        }

        if (settings.mode === 'gaussian' && settings.amount > 0) {
            gaussianBlurGrayArray(src, dst, tmp, w, h, settings.amount);
            return;
        }

        if (settings.mode === 'pixelate' && settings.amount > 1) {
            pixelateGrayArray(src, dst, w, h, settings.amount);
            return;
        }

        if (settings.mode === 'subsample' && settings.amount > 1) {
            subsampleGrayArray(src, dst, w, h, settings.amount);
            return;
        }

        dst.set(src);
    }

    function applyChannelModifications() {
        filterGrayArray(ch1, ch1m, blurTmp1, width, height, channelSettings[0]);
        filterGrayArray(ch2, ch2m, blurTmp2, width, height, channelSettings[1]);
        filterGrayArray(ch3, ch3m, blurTmp3, width, height, channelSettings[2]);
    }

    function recomposeFromModifiedChannels() {
        const dst = resultImageData.data;
        const n = width * height;
        const ib = inverseBasis;

        const b10 = base1[3];
        const b20 = base2[3];
        const b30 = base3[3];

        const m1 = ch1m;
        const m2 = ch2m;
        const m3 = ch3m;

        for (let p = 0, i = 0; p < n; p++, i += 4) {
            const c1 = m1[p] - b10;
            const c2 = m2[p] - b20;
            const c3 = m3[p] - b30;

            const r = ib[0][0] * c1 + ib[0][1] * c2 + ib[0][2] * c3;
            const g = ib[1][0] * c1 + ib[1][1] * c2 + ib[1][2] * c3;
            const b = ib[2][0] * c1 + ib[2][1] * c2 + ib[2][2] * c3;

            dst[i] = clamp255(r + 0.5);
            dst[i + 1] = clamp255(g + 0.5);
            dst[i + 2] = clamp255(b + 0.5);
            dst[i + 3] = 255;
        }
    }

    function channelVariance(c) {
        const n = c.length;
        if (n === 0) return 0;

        let mean = 0;
        for (let i = 0; i < n; i++) mean += c[i];
        mean /= n;

        let varSum = 0;
        for (let i = 0; i < n; i++) {
            const d = c[i] - mean;
            varSum += d * d;
        }

        return varSum / n;
    }

    function computeRelativeVarianceStats(a, b, c) {
        const va = channelVariance(a);
        const vb = channelVariance(b);
        const vc = channelVariance(c);

        const total = va + vb + vc;
        if (total <= 1e-12) return { a: 0, b: 0, c: 0 };

        return {
            a: 100 * va / total,
            b: 100 * vb / total,
            c: 100 * vc / total
        };
    }

    function updateStats() {
        const rawStats = computeRelativeVarianceStats(ch1, ch2, ch3);
        channelStats.c1 = rawStats.a;
        channelStats.c2 = rawStats.b;
        channelStats.c3 = rawStats.c;

        const modStats = computeRelativeVarianceStats(ch1m, ch2m, ch3m);
        channelStats.c1m = modStats.a;
        channelStats.c2m = modStats.b;
        channelStats.c3m = modStats.c;
    }

    function flushDirtyBuffersToCanvases() {
        if (decomposeDirty || displayDirty) {
            fillGrayImageData(ch1, c1ImageData);
            fillGrayImageData(ch2, c2ImageData);
            fillGrayImageData(ch3, c3ImageData);

            bufferContexts.c1.putImageData(c1ImageData, 0, 0);
            bufferContexts.c2.putImageData(c2ImageData, 0, 0);
            bufferContexts.c3.putImageData(c3ImageData, 0, 0);
        }

        if (filterDirty || displayDirty) {
            fillGrayImageData(ch1m, c1mImageData);
            fillGrayImageData(ch2m, c2mImageData);
            fillGrayImageData(ch3m, c3mImageData);

            bufferContexts.c1m.putImageData(c1mImageData, 0, 0);
            bufferContexts.c2m.putImageData(c2mImageData, 0, 0);
            bufferContexts.c3m.putImageData(c3mImageData, 0, 0);
        }

        if (resultDirty || displayDirty) {
            bufferContexts.result.putImageData(resultImageData, 0, 0);
        }
    }

    function updateHtmlLabels() {
        Object.keys(channelStats).forEach(id => {
            const container = document.getElementById(id);
            if (!container) return;

            const label = container.querySelector('.energy-label');
            if (label) {
                label.textContent = `Energy: ${channelStats[id].toFixed(0)}%`;
            }
        });

        const resultContainer = document.getElementById('result');
        if (resultContainer) {
            const label = resultContainer.querySelector('.similarity-label');
            if (label) {
                label.textContent = `Similarity: ${imageSimilarityPercent.toFixed(1)}%`;
            }
        }
    }

    function srgbToLinear(c) {
        c /= 255;
        if (c <= 0.04045) return c / 12.92;
        return Math.pow((c + 0.055) / 1.055, 2.4);
    }

    function rgbToXyz(r, g, b) {
        const rl = srgbToLinear(r);
        const gl = srgbToLinear(g);
        const bl = srgbToLinear(b);

        return [
            rl * 0.4124564 + gl * 0.3575761 + bl * 0.1804375,
            rl * 0.2126729 + gl * 0.7151522 + bl * 0.0721750,
            rl * 0.0193339 + gl * 0.1191920 + bl * 0.9503041
        ];
    }

    function xyzToLab(x, y, z) {
        const xn = 0.95047;
        const yn = 1.00000;
        const zn = 1.08883;

        function f(t) {
            const delta = 6 / 29;
            const delta3 = delta * delta * delta;
            if (t > delta3) return Math.cbrt(t);
            return t / (3 * delta * delta) + 4 / 29;
        }

        const fx = f(x / xn);
        const fy = f(y / yn);
        const fz = f(z / zn);

        return [
            116 * fy - 16,
            500 * (fx - fy),
            200 * (fy - fz)
        ];
    }

    function rgbToLab(r, g, b) {
        const xyz = rgbToXyz(r, g, b);
        return xyzToLab(xyz[0], xyz[1], xyz[2]);
    }

    function deltaE76(lab1, lab2) {
        const dL = lab1[0] - lab2[0];
        const da = lab1[1] - lab2[1];
        const db = lab1[2] - lab2[2];
        return Math.sqrt(dL * dL + da * da + db * db);
    }

    function computeMeanDeltaESubsampled(dataA, dataB, step = 4) {
        if (!dataA || !dataB) return 0;

        let sum = 0;
        let count = 0;

        for (let y = 0; y < height; y += step) {
            const row = y * width;
            for (let x = 0; x < width; x += step) {
                const i = (row + x) * 4;

                const labA = rgbToLab(dataA[i], dataA[i + 1], dataA[i + 2]);
                const labB = rgbToLab(dataB[i], dataB[i + 1], dataB[i + 2]);

                sum += deltaE76(labA, labB);
                count++;
            }
        }

        return count ? sum / count : 0;
    }

    function deltaEToMatchPercent(meanDeltaE) {
        return 100 * Math.exp(-meanDeltaE / 12);
    }

    function scheduleMetrics() {
        clearTimeout(metricsTimer);
        metricsTimer = setTimeout(() => {
            if (!sourceImageData || !resultImageData) {
                meanDeltaE = 0;
                imageSimilarityPercent = 100;
            } else {
                meanDeltaE = computeMeanDeltaESubsampled(
                    sourceImageData.data,
                    resultImageData.data,
                    4
                );
                imageSimilarityPercent = deltaEToMatchPercent(meanDeltaE);
            }

            updateHtmlLabels();
        }, 120);
    }

    function schedulePipeline() {
        if (pipelineQueued) return;
        pipelineQueued = true;
        requestAnimationFrame(runPipeline);
    }

    function scheduleRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
            renderQueued = false;
            renderAll();
        });
    }

    function markBasisDirty() {
        decomposeDirty = true;
        filterDirty = true;
        resultDirty = true;
        statsDirty = true;
        displayDirty = true;
        labelsDirty = true;
        metricsDirty = true;
        schedulePipeline();
    }

    function markFilterDirty() {
        filterDirty = true;
        resultDirty = true;
        statsDirty = true;
        displayDirty = true;
        labelsDirty = true;
        metricsDirty = true;
        schedulePipeline();
    }

    function runPipeline() {
        pipelineQueued = false;
        if (!sourcePixels || !inverseBasis) return;

        const hadDecomposeDirty = decomposeDirty;
        const hadFilterDirty = filterDirty;
        const hadResultDirty = resultDirty;
        const hadStatsDirty = statsDirty;
        const hadDisplayDirty = displayDirty;
        const hadLabelsDirty = labelsDirty;
        const hadMetricsDirty = metricsDirty;

        if (decomposeDirty) {
            decomposeChannels();
        }

        if (filterDirty) {
            applyChannelModifications();
        }

        if (resultDirty) {
            recomposeFromModifiedChannels();
        }

        if (statsDirty) {
            updateStats();
        }

        if (hadDecomposeDirty || hadFilterDirty || hadResultDirty || hadDisplayDirty) {
            flushDirtyBuffersToCanvases();
        }

        if (hadStatsDirty || hadLabelsDirty) {
            updateHtmlLabels();
        }

        if (hadDecomposeDirty || hadFilterDirty || hadResultDirty || hadDisplayDirty) {
            renderAll();
        }

        if (hadMetricsDirty) {
            scheduleMetrics();
        }

        decomposeDirty = false;
        filterDirty = false;
        resultDirty = false;
        statsDirty = false;
        displayDirty = false;
        labelsDirty = false;
        metricsDirty = false;
    }

    function getCanvasDisplaySize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        return {
            w: canvas.width / dpr,
            h: canvas.height / dpr
        };
    }

    function getFitScale(canvas) {
        if (!width || !height) return 1;
        const size = getCanvasDisplaySize(canvas);
        return Math.min(size.w / width, size.h / height);
    }

    function getEffectiveScale(canvas) {
        return getFitScale(canvas) * viewState.zoom;
    }

    function resizeVisibleCanvases() {
        viewIds.forEach(id => {
            const container = document.getElementById(id);
            const canvas = container.querySelector('canvas');
            const rect = container.getBoundingClientRect();

            const dpr = window.devicePixelRatio || 1;
            const displayWidth = Math.max(1, Math.round(rect.width));
            const displayHeight = Math.max(1, Math.round(rect.height));

            canvas.width = Math.round(displayWidth * dpr);
            canvas.height = Math.round(displayHeight * dpr);
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
        });
    }

    function updateZoomLimits() {
        viewState.minZoom = 1;
        viewState.maxZoom = 64;
        viewState.zoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom || 1));
    }

    function resetView() {
        viewState.cx = width / 2;
        viewState.cy = height / 2;
        updateZoomLimits();
        viewState.zoom = 1;
        clampView();
        renderAll();
    }

    function clampView() {
        let maxHalfW = 0;
        let maxHalfH = 0;

        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            if (!canvas) return;

            const size = getCanvasDisplaySize(canvas);
            const scale = getEffectiveScale(canvas);

            const halfW = size.w / (2 * scale);
            const halfH = size.h / (2 * scale);

            maxHalfW = Math.max(maxHalfW, halfW);
            maxHalfH = Math.max(maxHalfH, halfH);
        });

        if (maxHalfW * 2 >= width) {
            viewState.cx = width / 2;
        } else {
            viewState.cx = Math.max(maxHalfW, Math.min(width - maxHalfW, viewState.cx));
        }

        if (maxHalfH * 2 >= height) {
            viewState.cy = height / 2;
        } else {
            viewState.cy = Math.max(maxHalfH, Math.min(height - maxHalfH, viewState.cy));
        }
    }

    function renderView(viewId) {
        const visibleCanvas = document.querySelector(`#${viewId} canvas`);
        if (!visibleCanvas) return;

        const ctx = visibleContexts[viewId];
        const srcCanvas = buffers[viewId];
        const dpr = window.devicePixelRatio || 1;
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, dw, dh);

        if (!srcCanvas || !srcCanvas.width || !srcCanvas.height) return;

        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        ctx.imageSmoothingEnabled = !(viewState.zoom > 4);
        ctx.imageSmoothingQuality = 'low';

        ctx.drawImage(
            srcCanvas,
            sx, sy, sw, sh,
            0, 0, dw, dh
        );
    }

    function renderAll() {
        for (const id of viewIds) {
            renderView(id);
        }
    }

    function handleResize() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        const ih = (windowWidth - 2 * margin) * 0.5;
        const iv = windowHeight - 2 * margin;
        const h = (ih - hpadding) / 6.0;
        const h2 = (ih - hpadding * 2) / 6.0;
        const v = (iv - vpadding * 2) / 7.0;
        const imageChooserHeight = 96;

        let div = document.querySelector('#source');
        div.style.left = `${windowWidth - margin - h * 6 - hpadding}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${h * 3}px`;
        div.style.height = `${v * 3}px`;

        div = document.querySelector('#result');
        div.style.left = `${windowWidth - margin - h * 3}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${h * 3}px`;
        div.style.height = `${v * 3}px`;

        for (let y = 0; y < 3; y++) {
            div = document.querySelector(`#c${y + 1}`);
            div.style.left = `${windowWidth - margin - h * 6 - hpadding + (h2 * 2 + hpadding) * y}px`;
            div.style.top = `${margin + v * 3 + vpadding}px`;
            div.style.width = `${h2 * 2}px`;
            div.style.height = `${v * 2}px`;
        }

        for (let y = 0; y < 3; y++) {
            div = document.querySelector(`#c${y + 1}m`);
            div.style.left = `${windowWidth - margin - h * 6 - hpadding + (h2 * 2 + hpadding) * y}px`;
            div.style.top = `${margin + v * 5 + vpadding * 2}px`;
            div.style.width = `${h2 * 2}px`;
            div.style.height = `${v * 2}px`;
        }

        div = document.querySelector('.channel_div');
        div.style.left = `${margin}px`;
        div.style.top = `${margin + imageChooserHeight + vpadding}px`;
        div.style.width = `${windowWidth - ih - hpadding - 2 * margin}px`;

        div = document.querySelector('.image_chooser');
        div.style.left = `${margin}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${windowWidth - ih - hpadding - 2 * margin}px`;
        div.style.height = `${imageChooserHeight}px`;

        resizeVisibleCanvases();
        updateZoomLimits();
        clampView();
        scheduleRender();
    }

    function loadImage(src) {
        document.getElementById('base_image').src = src;
    }

    function screenToImage(canvas, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        return {
            x: sx + (x / size.w) * sw,
            y: sy + (y / size.h) * sh
        };
    }

    function zoomAt(canvas, clientX, clientY, zoomFactor) {
        const before = screenToImage(canvas, clientX, clientY);
        const newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom * zoomFactor));
        if (newZoom === viewState.zoom) return;

        viewState.zoom = newZoom;

        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = before.x - ((px / size.w) - 0.5) * sw;
        viewState.cy = before.y - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function panByScreenDelta(canvas, dx, dy) {
        const scale = getEffectiveScale(canvas);
        viewState.cx -= dx / scale;
        viewState.cy -= dy / scale;
        clampView();
        scheduleRender();
    }

    function getTwoPointers() {
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return null;
        return [vals[0], vals[1]];
    }

    function distance(a, b) {
        const dx = a.clientX - b.clientX;
        const dy = a.clientY - b.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function midpoint(a, b) {
        return {
            clientX: (a.clientX + b.clientX) / 2,
            clientY: (a.clientY + b.clientY) / 2
        };
    }

    function startGesture(canvas) {
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const anchor = screenToImage(canvas, mid.clientX, mid.clientY);

        gesture = {
            canvas,
            startDistance: distance(p1, p2),
            startZoom: viewState.zoom,
            anchorImageX: anchor.x,
            anchorImageY: anchor.y
        };
    }

    function updateGesture() {
        if (!gesture) return;
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const newDistance = distance(p1, p2);
        if (gesture.startDistance <= 0) return;

        let newZoom = gesture.startZoom * (newDistance / gesture.startDistance);
        newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, newZoom));
        viewState.zoom = newZoom;

        const canvas = gesture.canvas;
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = mid.clientX - rect.left;
        const py = mid.clientY - rect.top;
        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = gesture.anchorImageX - ((px / size.w) - 0.5) * sw;
        viewState.cy = gesture.anchorImageY - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function attachInteractions(canvas) {
        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            zoomAt(canvas, e.clientX, e.clientY, factor);
        }, { passive: false });

        canvas.addEventListener('dblclick', function(e) {
            e.preventDefault();
            zoomAt(canvas, e.clientX, e.clientY, 2);
        });

        canvas.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);

            pointers.set(e.pointerId, {
                pointerId: e.pointerId,
                clientX: e.clientX,
                clientY: e.clientY,
                prevX: e.clientX,
                prevY: e.clientY
            });

            if (pointers.size === 2) {
                startGesture(canvas);
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!pointers.has(e.pointerId)) return;

            const p = pointers.get(e.pointerId);
            const dx = e.clientX - p.prevX;
            const dy = e.clientY - p.prevY;

            p.clientX = e.clientX;
            p.clientY = e.clientY;
            p.prevX = e.clientX;
            p.prevY = e.clientY;
            pointers.set(e.pointerId, p);

            if (pointers.size === 1) {
                panByScreenDelta(canvas, dx, dy);
            } else if (pointers.size >= 2) {
                updateGesture();
            }
        });

        function endPointer(e) {
            pointers.delete(e.pointerId);
            if (pointers.size < 2) {
                gesture = null;
            } else {
                startGesture(canvas);
            }
        }

        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);
    }

    function setupInteractions() {
        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            visibleContexts[id] = canvas.getContext('2d');
            attachInteractions(canvas);
        });
    }

    function enableAutoSelect(el) {
        el.addEventListener('focus', () => el.select());
        el.addEventListener('click', () => el.select());
    }

    function buildChannelControls() {
        const bases = [base1, base2, base3];

        for (let i = 0; i < 3; i++) {
            const div = document.querySelector(`#channel${i}`);

            for (let k = 0; k < 4; k++) {
                if (k === 3) div.append(document.createElement('hr'));

                const container = document.createElement('div');
                container.classList.add('input-pair');

                const label = ['R', 'G', 'B', 'Bias'][k];
                const p = document.createElement('p');
                p.textContent = label;
                container.append(p);

                const isOffset = k === 3;
                const min = isOffset ? 0 : -1;
                const max = isOffset ? 128 : 1;
                const step = isOffset ? 16 : 0.1;

                const input = document.createElement('input');
                input.type = 'text';
                input.classList.add('form-control');
                input.min = String(min);
                input.max = String(max);
                input.step = String(step);
                input.value = String(bases[i][k]);
                container.append(input);
                enableAutoSelect(input);

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.classList.add('form-range');
                slider.min = String(min);
                slider.max = String(max);
                slider.step = String(step);
                slider.value = input.value;
                container.append(slider);

                div.append(container);

                function clampBasisValue(rawValue) {
                    const val = parseFloat(rawValue);
                    if (Number.isNaN(val)) return null;
                    return Math.max(min, Math.min(max, val));
                }

                function commitBasisValue(rawValue) {
                    const val = clampBasisValue(rawValue);
                    if (val === null) return;

                    bases[i][k] = val;
                    input.value = String(val);
                    slider.value = String(val);

                    inverseBasis = null;
                    updateInverseBasis();
                    markBasisDirty();
                }

                input.addEventListener('input', function() {
                    const val = clampBasisValue(input.value);
                    if (val !== null) slider.value = String(val);
                });

                input.addEventListener('change', function() {
                    commitBasisValue(input.value);
                });

                slider.addEventListener('input', function() {
                    input.value = slider.value;
                    commitBasisValue(slider.value);
                });
            }

            div.append(document.createElement('hr'));

            const blurContainer = document.createElement('div');
            blurContainer.classList.add('input-pair');

            const blurLabel = document.createElement('p');
            blurLabel.textContent = 'Blur';
            blurContainer.append(blurLabel);

            const blurInput = document.createElement('input');
            blurInput.type = 'text';
            blurInput.classList.add('form-control');
            blurInput.min = '0';
            blurInput.max = '16';
            blurInput.step = '1';
            blurInput.value = String(channelSettings[i].amount);
            blurContainer.append(blurInput);

            const blurSlider = document.createElement('input');
            blurSlider.type = 'range';
            blurSlider.classList.add('form-range');
            blurSlider.min = '0';
            blurSlider.max = '16';
            blurSlider.step = '1';
            blurSlider.value = blurInput.value;
            blurContainer.append(blurSlider);

            div.append(blurContainer);

            function clampBlurValue(rawValue) {
                const val = parseInt(rawValue, 10);
                if (Number.isNaN(val)) return null;
                return Math.max(0, Math.min(16, val));
            }

            function commitBlurValue(rawValue) {
                const val = clampBlurValue(rawValue);
                if (val === null) return;

                channelSettings[i].mode = 'gaussian';
                channelSettings[i].amount = val;

                blurInput.value = String(val);
                blurSlider.value = String(val);

                markFilterDirty();
            }

            blurInput.addEventListener('input', function() {
                const val = clampBlurValue(blurInput.value);
                if (val !== null) blurSlider.value = String(val);
            });

            blurInput.addEventListener('change', function() {
                commitBlurValue(blurInput.value);
            });

            blurSlider.addEventListener('input', function() {
                blurInput.value = blurSlider.value;
                commitBlurValue(blurSlider.value);
            });

            enableAutoSelect(blurInput);
        }
    }

    function initBufferContexts() {
        viewIds.forEach(id => {
            const opts = id === 'source' ? { willReadFrequently: true } : undefined;
            bufferContexts[id] = buffers[id].getContext('2d', opts);
        });
    }

    function loadCurrentImageIntoPipeline() {
        const baseImage = document.getElementById('base_image');

        width = baseImage.naturalWidth;
        height = baseImage.naturalHeight;

        Object.values(buffers).forEach(c => {
            c.width = width;
            c.height = height;
        });

        const ctx = bufferContexts.source;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(baseImage, 0, 0, width, height);

        sourceImageData = ctx.getImageData(0, 0, width, height);
        sourcePixels = sourceImageData.data;

        ensureWorkingBuffers();
        updateInverseBasis();

        decomposeDirty = true;
        filterDirty = true;
        resultDirty = true;
        statsDirty = true;
        displayDirty = true;
        labelsDirty = true;
        metricsDirty = true;

        schedulePipeline();
        resetView();
    }

    window.addEventListener('resize', handleResize);

    document.addEventListener('DOMContentLoaded', function() {
        initBufferContexts();
        handleResize();
        setupInteractions();
        buildChannelControls();
        updateInverseBasis();

        const baseImage = document.getElementById('base_image');

        baseImage.addEventListener('load', function() {
            loadCurrentImageIntoPipeline();
        });

        const images = [
            'jpeg/25.jpg',
            'jpeg/30.jpg',
            'jpeg/33.jpg',
            'jpeg/44.jpg',
            'jpeg/76.jpg',
            'jpeg/91.jpg',
        ];

        const imageChooser = document.querySelector('.image_chooser');
        for (const imgSrc of images) {
            const img = document.createElement('img');
            img.src = imgSrc;
            img.style.maxHeight = '100%';
            img.style.cursor = 'pointer';
            img.addEventListener('click', function() {
                loadImage(imgSrc);
            });
            imageChooser.append(img);
        }

        const firstImage = imageChooser.querySelector('img');
        if (firstImage) firstImage.click();
    });
</script>
