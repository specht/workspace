</style>

<div class="container-fluid">
    <div class="col-md-12">
        <img id="base_image" style="display: none;">
        <div class="channel_div">
            <div class="channel_container" id="channel0"></div>
            <div class="channel_container" id="channel1"></div>
            <div class="channel_container" id="channel2"></div>
        </div>
        <div class="canvas_container" id="source"><canvas></canvas></div>
        <div class="canvas_container" id="c1"><canvas></canvas></div>
        <div class="canvas_container" id="c2"><canvas></canvas></div>
        <div class="canvas_container" id="c3"><canvas></canvas></div>
        <div class="canvas_container" id="c1m"><canvas></canvas></div>
        <div class="canvas_container" id="c2m"><canvas></canvas></div>
        <div class="canvas_container" id="c3m"><canvas></canvas></div>
        <div class="canvas_container" id="result"><canvas></canvas></div>
    </div>
</div>

<script>
    var hpadding = 10;
    var vpadding = 10;
    var margin = 10;
    var width = 128;
    var height = 128;

    var base1 = [1.0, 0.0, 0.0, 0];
    var base2 = [0.0, 1.0, 0.0, 0];
    var base3 = [0.0, 0.0, 1.0, 0];
    // YCbCr color space basis vectors
    // var base1 = [0.299, 0.587, 0.114, 16];       // Y
    // var base2 = [-0.169, -0.331, 0.5, 128];     // Cb
    // var base3 = [0.5, -0.419, -0.081, 128];     // Cr

    var inverseBasis = null;

    // Shared synchronized viewport
    const viewState = {
        zoom: 1,       // screen px per image px
        minZoom: 1,
        maxZoom: 64,
        cx: 0,          // viewport center in image coordinates
        cy: 0
    };

    const channelSettings = [
        { mode: 'none', amount: 0 },
        { mode: 'none', amount: 0 },
        { mode: 'none', amount: 0 },
    ]

    // Full-resolution source buffers
    const buffers = {
        source: document.createElement('canvas'),
        c1: document.createElement('canvas'),
        c2: document.createElement('canvas'),
        c3: document.createElement('canvas'),
        c1m: document.createElement('canvas'),
        c2m: document.createElement('canvas'),
        c3m: document.createElement('canvas'),
        result: document.createElement('canvas')
    };

    const viewIds = ['source', 'c1', 'c2', 'c3', 'c1m', 'c2m', 'c3m', 'result'];

    // Track pointers for mouse/touch/pinch
    const pointers = new Map();
    let gesture = null;

    function getCanvasDisplaySize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        return {
            w: canvas.width / dpr,
            h: canvas.height / dpr
        };
    }

    function getFitScale(canvas) {
        if (!width || !height) return 1;
        const size = getCanvasDisplaySize(canvas);
        return Math.min(size.w / width, size.h / height);
    }

    function getEffectiveScale(canvas) {
        return getFitScale(canvas) * viewState.zoom;
    }

    function determinant3x3(v1, v2, v3) {
        return (
            v1[0] * (v2[1] * v3[2] - v2[2] * v3[1]) -
            v1[1] * (v2[0] * v3[2] - v2[2] * v3[0]) +
            v1[2] * (v2[0] * v3[1] - v2[1] * v3[0])
        );
    }

    function inverseMatrix3x3(v1, v2, v3) {
        let det = determinant3x3(v1, v2, v3);
        if (Math.abs(det) < 1e-10) return null;

        let inv = [
            [(v2[1] * v3[2] - v2[2] * v3[1]) / det, (v1[2] * v3[1] - v1[1] * v3[2]) / det, (v1[1] * v2[2] - v1[2] * v2[1]) / det],
            [(v2[2] * v3[0] - v2[0] * v3[2]) / det, (v1[0] * v3[2] - v1[2] * v3[0]) / det, (v1[2] * v2[0] - v1[0] * v2[2]) / det],
            [(v2[0] * v3[1] - v2[1] * v3[0]) / det, (v1[1] * v3[0] - v1[0] * v3[1]) / det, (v1[0] * v2[1] - v1[1] * v2[0]) / det]
        ];
        return inv;
    }

    function updateInverseBasis() {
        inverseBasis = inverseMatrix3x3(base1, base2, base3);
        if (!inverseBasis) {
            throw new Error('Basis vectors are not invertible.');
        }
    }

    function reconstructRgbFromComponents(v1, v2, v3) {
        if (!inverseBasis) {
            updateInverseBasis();
        }

        // Remove affine offsets first
        const c1 = v1 - base1[3];
        const c2 = v2 - base2[3];
        const c3 = v3 - base3[3];

        // Solve:
        // [c1]   [b1x b1y b1z] [r]
        // [c2] = [b2x b2y b2z] [g]
        // [c3]   [b3x b3y b3z] [b]
        //
        // so [r g b]^T = inverseBasis * [c1 c2 c3]^T
        const r = inverseBasis[0][0] * c1 + inverseBasis[0][1] * c2 + inverseBasis[0][2] * c3;
        const g = inverseBasis[1][0] * c1 + inverseBasis[1][1] * c2 + inverseBasis[1][2] * c3;
        const b = inverseBasis[2][0] * c1 + inverseBasis[2][1] * c2 + inverseBasis[2][2] * c3;

        return [
            clamp255(r),
            clamp255(g),
            clamp255(b)
        ];
    }

    function copyImageData(img) {
        return new ImageData(new Uint8ClampedArray(img.data), img.width, img.height);
    }

    function gaussianKernel1D(radius) {
        if (radius <= 0) return [1];

        const sigma = Math.max(radius / 2, 0.8);
        const size = radius * 2 + 1;
        const kernel = new Array(size);
        let sum = 0;

        for (let i = -radius; i <= radius; i++) {
            const v = Math.exp(-(i * i) / (2 * sigma * sigma));
            kernel[i + radius] = v;
            sum += v;
        }

        for (let i = 0; i < size; i++) {
            kernel[i] /= sum;
        }

        return kernel;
    }

    function gaussianBlurGray(imageData, radius) {
        radius = Math.max(0, Math.floor(radius));
        if (radius <= 0) return copyImageData(imageData);

        const w = imageData.width;
        const h = imageData.height;
        const src = imageData.data;
        const tmp = new Uint8ClampedArray(src.length);
        const out = new Uint8ClampedArray(src.length);
        const kernel = gaussianKernel1D(radius);

        // Horizontal pass
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                let sum = 0;
                let alpha = 0;

                for (let k = -radius; k <= radius; k++) {
                    let xx = Math.max(0, Math.min(w - 1, x + k));
                    let idx = 4 * (y * w + xx);
                    let weight = kernel[k + radius];
                    sum += src[idx] * weight;
                    alpha += src[idx + 3] * weight;
                }

                let outIdx = 4 * (y * w + x);
                let v = Math.round(sum);
                tmp[outIdx] = v;
                tmp[outIdx + 1] = v;
                tmp[outIdx + 2] = v;
                tmp[outIdx + 3] = Math.round(alpha);
            }
        }

        // Vertical pass
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                let sum = 0;
                let alpha = 0;

                for (let k = -radius; k <= radius; k++) {
                    let yy = Math.max(0, Math.min(h - 1, y + k));
                    let idx = 4 * (yy * w + x);
                    let weight = kernel[k + radius];
                    sum += tmp[idx] * weight;
                    alpha += tmp[idx + 3] * weight;
                }

                let outIdx = 4 * (y * w + x);
                let v = Math.round(sum);
                out[outIdx] = v;
                out[outIdx + 1] = v;
                out[outIdx + 2] = v;
                out[outIdx + 3] = Math.round(alpha);
            }
        }

        return new ImageData(out, w, h);
    }

    function pixelateGray(imageData, blockSize) {
        blockSize = Math.max(1, Math.floor(blockSize));
        if (blockSize <= 1) return copyImageData(imageData);

        const w = imageData.width;
        const h = imageData.height;
        const src = imageData.data;
        const out = new Uint8ClampedArray(src.length);

        for (let by = 0; by < h; by += blockSize) {
            for (let bx = 0; bx < w; bx += blockSize) {
                let sum = 0;
                let alpha = 0;
                let count = 0;

                for (let y = by; y < Math.min(by + blockSize, h); y++) {
                    for (let x = bx; x < Math.min(bx + blockSize, w); x++) {
                        const idx = 4 * (y * w + x);
                        sum += src[idx];
                        alpha += src[idx + 3];
                        count++;
                    }
                }

                const v = Math.round(sum / count);
                const a = Math.round(alpha / count);

                for (let y = by; y < Math.min(by + blockSize, h); y++) {
                    for (let x = bx; x < Math.min(bx + blockSize, w); x++) {
                        const idx = 4 * (y * w + x);
                        out[idx] = v;
                        out[idx + 1] = v;
                        out[idx + 2] = v;
                        out[idx + 3] = a;
                    }
                }
            }
        }

        return new ImageData(out, w, h);
    }

    function filterGrayImage(imageData, settings) {
        if (!settings || settings.mode === 'none' || settings.amount <= 0) {
            return copyImageData(imageData);
        }

        if (settings.mode === 'gaussian') {
            return gaussianBlurGray(imageData, settings.amount);
        }

        if (settings.mode === 'pixelate') {
            return pixelateGray(imageData, settings.amount);
        }

        return copyImageData(imageData);
    }

    function channelValueAt(data, i) {
        return data[i]; // grayscale, so R=G=B
    }

    function updateInverseBasis() {
        inverseBasis = inverseMatrix3x3(base1, base2, base3);
        if (!inverseBasis) {
            throw new Error('Basis vectors are not invertible.');
        }
    }

    function reconstructRgbFromComponents(v1, v2, v3) {
        if (!inverseBasis) {
            updateInverseBasis();
        }

        // Remove affine offsets first
        const c1 = v1 - base1[3];
        const c2 = v2 - base2[3];
        const c3 = v3 - base3[3];

        // Solve:
        // [c1]   [b1x b1y b1z] [r]
        // [c2] = [b2x b2y b2z] [g]
        // [c3]   [b3x b3y b3z] [b]
        //
        // so [r g b]^T = inverseBasis * [c1 c2 c3]^T
        const r = inverseBasis[0][0] * c1 + inverseBasis[0][1] * c2 + inverseBasis[0][2] * c3;
        const g = inverseBasis[1][0] * c1 + inverseBasis[1][1] * c2 + inverseBasis[1][2] * c3;
        const b = inverseBasis[2][0] * c1 + inverseBasis[2][1] * c2 + inverseBasis[2][2] * c3;

        return [
            clamp255(r),
            clamp255(g),
            clamp255(b)
        ];
    }

    function recomposeFromModifiedChannels() {
        const c1ctx = buffers.c1m.getContext('2d');
        const c2ctx = buffers.c2m.getContext('2d');
        const c3ctx = buffers.c3m.getContext('2d');
        const resultCtx = buffers.result.getContext('2d');

        const img1 = c1ctx.getImageData(0, 0, width, height);
        const img2 = c2ctx.getImageData(0, 0, width, height);
        const img3 = c3ctx.getImageData(0, 0, width, height);

        const d1 = img1.data;
        const d2 = img2.data;
        const d3 = img3.data;

        const out = resultCtx.createImageData(width, height);
        const dst = out.data;

        for (let i = 0; i < dst.length; i += 4) {
            const v1 = channelValueAt(d1, i);
            const v2 = channelValueAt(d2, i);
            const v3 = channelValueAt(d3, i);

            const rgb = reconstructRgbFromComponents(v1, v2, v3);

            dst[i] = rgb[0];
            dst[i + 1] = rgb[1];
            dst[i + 2] = rgb[2];
            dst[i + 3] = 255;
        }

        resultCtx.putImageData(out, 0, 0);
    }

    function handleResize() {
        let windowWidth = window.innerWidth;
        let windowHeight = window.innerHeight;
        let ih = (windowWidth - 2 * margin) * 0.5;
        let iv = windowHeight - 2 * margin;
        let h = (ih - hpadding) / 6.0;
        let h2 = (ih - hpadding * 2) / 6.0;
        let v = (iv - vpadding * 2) / 7.0;

        let div = document.querySelector('#source');
        div.style.left = `${windowWidth - margin - h * 6 - hpadding}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${h * 3}px`;
        div.style.height = `${v * 3}px`;

        div = document.querySelector('#result');
        div.style.left = `${windowWidth - margin - h * 3}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${h * 3}px`;
        div.style.height = `${v * 3}px`;

        for (let y = 0; y < 3; y++) {
            div = document.querySelector(`#c${y + 1}`);
            div.style.left = `${windowWidth - margin - h * 6 - hpadding + (h2 * 2 + hpadding) * y}px`;
            div.style.top = `${margin + v * 3 + vpadding}px`;
            div.style.width = `${h2 * 2}px`;
            div.style.height = `${v * 2}px`;
        }

        for (let y = 0; y < 3; y++) {
            div = document.querySelector(`#c${y + 1}m`);
            div.style.left = `${windowWidth - margin - h * 6 - hpadding + (h2 * 2 + hpadding) * y}px`;
            div.style.top = `${margin + v * 5 + vpadding * 2}px`;
            div.style.width = `${h2 * 2}px`;
            div.style.height = `${v * 2}px`;
        }

        div = document.querySelector('.channel_div');
        div.style.left = `${margin}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${windowWidth - ih - hpadding - 2 * margin}px`;
        div.style.height = `${windowHeight - 2 * margin}px`;

        resizeVisibleCanvases();
        updateZoomLimits();
        clampView();
        renderAll();
    }

    function loadImage(src) {
        let base_image = document.getElementById('base_image');
        base_image.src = src;
    }

    function dot(a, b) {
        return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    function normalize(v) {
        let len = Math.sqrt(dot(v, v));
        if (len === 0) return [0, 0, 0];
        return [v[0] / len, v[1] / len, v[2] / len];
    }

    function clamp255(x) {
        return Math.max(0, Math.min(255, Math.round(x)));
    }

    function applyBasis(rgb, base) {
        return (
            rgb[0] * base[0] +
            rgb[1] * base[1] +
            rgb[2] * base[2] +
            base[3]
        );
    }

    function resizeVisibleCanvases() {
        viewIds.forEach(id => {
            const container = document.getElementById(id);
            const canvas = container.querySelector('canvas');
            const rect = container.getBoundingClientRect();

            const dpr = window.devicePixelRatio || 1;
            const displayWidth = Math.max(1, Math.round(rect.width));
            const displayHeight = Math.max(1, Math.round(rect.height));

            canvas.width = Math.round(displayWidth * dpr);
            canvas.height = Math.round(displayHeight * dpr);
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
        });
    }

    function getReferenceCanvas() {
        return document.querySelector('#source canvas');
    }

    function getCanvasSize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        return {
            w: canvas.width / dpr,
            h: canvas.height / dpr
        };
    }

    function updateZoomLimits() {
        viewState.minZoom = 1;
        viewState.maxZoom = 64;
        viewState.zoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom || 1));
    }

    function resetView() {
        viewState.cx = width / 2;
        viewState.cy = height / 2;
        updateZoomLimits();
        viewState.zoom = 1;
        clampView();
        renderAll();
    }

    function clampView() {
        let maxHalfW = 0;
        let maxHalfH = 0;

        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            if (!canvas) return;

            const size = getCanvasDisplaySize(canvas);
            const scale = getEffectiveScale(canvas);

            const halfW = size.w / (2 * scale);
            const halfH = size.h / (2 * scale);

            maxHalfW = Math.max(maxHalfW, halfW);
            maxHalfH = Math.max(maxHalfH, halfH);
        });

        if (maxHalfW * 2 >= width) {
            viewState.cx = width / 2;
        } else {
            viewState.cx = Math.max(maxHalfW, Math.min(width - maxHalfW, viewState.cx));
        }

        if (maxHalfH * 2 >= height) {
            viewState.cy = height / 2;
        } else {
            viewState.cy = Math.max(maxHalfH, Math.min(height - maxHalfH, viewState.cy));
        }
    }

    function renderView(viewId) {
        const visibleCanvas = document.querySelector(`#${viewId} canvas`);
        if (!visibleCanvas) return;

        const ctx = visibleCanvas.getContext('2d');
        const srcCanvas = buffers[viewId];
        const dpr = window.devicePixelRatio || 1;
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, dw, dh);

        if (!srcCanvas || !srcCanvas.width || !srcCanvas.height) {
            return;
        }

        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        ctx.imageSmoothingEnabled = !(viewState.zoom > 4);
        ctx.imageSmoothingQuality = 'low';

        ctx.drawImage(
            srcCanvas,
            sx, sy, sw, sh,
            0, 0, dw, dh
        );
    }

    function renderAll() {
        viewIds.forEach(renderView);
    }

    function applyChannelModifications() {
        for (let k = 0; k < 3; k++) {
            const srcCanvas = buffers[`c${k + 1}`];
            const dstCanvas = buffers[`c${k + 1}m`];

            const srcCtx = srcCanvas.getContext('2d');
            const dstCtx = dstCanvas.getContext('2d');

            const srcImage = srcCtx.getImageData(0, 0, width, height);
            const filtered = filterGrayImage(srcImage, channelSettings[k]);

            dstCtx.putImageData(filtered, 0, 0);
        }

        recomposeFromModifiedChannels();
        renderAll();
    }    

    function decomposeImage() {
        const sourceCanvas = buffers.source;
        const sourceCtx = sourceCanvas.getContext('2d');
        const srcImageData = sourceCtx.getImageData(0, 0, width, height);
        const src = srcImageData.data;

        const rawTargets = [buffers.c1, buffers.c2, buffers.c3];
        rawTargets.forEach(c => {
            c.width = width;
            c.height = height;
        });

        ['c1m', 'c2m', 'c3m', 'result'].forEach(id => {
            buffers[id].width = width;
            buffers[id].height = height;
            buffers[id].getContext('2d').clearRect(0, 0, width, height);
        });

        const rawCtxs = rawTargets.map(c => c.getContext('2d'));
        const rawImages = rawCtxs.map(ctx => ctx.createImageData(width, height));
        const bases = [base1, base2, base3];

        for (let i = 0; i < src.length; i += 4) {
            const rgb = [src[i], src[i + 1], src[i + 2]];

            for (let k = 0; k < 3; k++) {
                const v = clamp255(applyBasis(rgb, bases[k]));
                const out = rawImages[k].data;

                out[i] = v;
                out[i + 1] = v;
                out[i + 2] = v;
                out[i + 3] = 255;
            }
        }

        for (let k = 0; k < 3; k++) {
            rawCtxs[k].putImageData(rawImages[k], 0, 0);
        }

        applyChannelModifications();
    }

    function screenToImage(canvas, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        return {
            x: sx + (x / size.w) * sw,
            y: sy + (y / size.h) * sh
        };
    }

    function zoomAt(canvas, clientX, clientY, zoomFactor) {
        const before = screenToImage(canvas, clientX, clientY);
        const newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom * zoomFactor));

        if (newZoom === viewState.zoom) return;

        viewState.zoom = newZoom;

        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = before.x - ((px / size.w) - 0.5) * sw;
        viewState.cy = before.y - ((py / size.h) - 0.5) * sh;

        clampView();
        renderAll();
    }

    function panByScreenDelta(canvas, dx, dy) {
        const scale = getEffectiveScale(canvas);
        viewState.cx -= dx / scale;
        viewState.cy -= dy / scale;
        clampView();
        renderAll();
    }

    function getTwoPointers() {
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return null;
        return [vals[0], vals[1]];
    }

    function distance(a, b) {
        const dx = a.clientX - b.clientX;
        const dy = a.clientY - b.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function midpoint(a, b) {
        return {
            clientX: (a.clientX + b.clientX) / 2,
            clientY: (a.clientY + b.clientY) / 2
        };
    }

    function startGesture(canvas) {
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        gesture = {
            canvas,
            startDistance: distance(p1, p2),
            startZoom: viewState.zoom,
            startCx: viewState.cx,
            startCy: viewState.cy,
            startMid: midpoint(p1, p2)
        };
    }

    function updateGesture() {
        if (!gesture) return;
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const newDistance = distance(p1, p2);

        if (gesture.startDistance <= 0) return;

        let newZoom = gesture.startZoom * (newDistance / gesture.startDistance);
        newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, newZoom));
        viewState.zoom = newZoom;

        const rect = gesture.canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(gesture.canvas);
        const scale = getEffectiveScale(gesture.canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;
        viewState.cx = before.x - ((px / size.w) - 0.5) * sw;
        viewState.cy = before.y - ((py / size.h) - 0.5) * sh;

        // Also translate according to midpoint movement
        const mdx = mid.clientX - gesture.startMid.clientX;
        const mdy = mid.clientY - gesture.startMid.clientY;

        viewState.cx -= mdx / scale;
        viewState.cy -= mdy / scale;

        clampView();
        renderAll();
    }

    function attachInteractions(canvas) {
        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();

            const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            zoomAt(canvas, e.clientX, e.clientY, factor);
        }, { passive: false });

        canvas.addEventListener('dblclick', function(e) {
            e.preventDefault();
            zoomAt(canvas, e.clientX, e.clientY, 2);
        });

        canvas.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);

            pointers.set(e.pointerId, {
                pointerId: e.pointerId,
                clientX: e.clientX,
                clientY: e.clientY,
                prevX: e.clientX,
                prevY: e.clientY
            });

            if (pointers.size === 2) {
                startGesture(canvas);
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!pointers.has(e.pointerId)) return;

            const p = pointers.get(e.pointerId);
            const dx = e.clientX - p.prevX;
            const dy = e.clientY - p.prevY;

            p.clientX = e.clientX;
            p.clientY = e.clientY;
            p.prevX = e.clientX;
            p.prevY = e.clientY;
            pointers.set(e.pointerId, p);

            if (pointers.size === 1) {
                panByScreenDelta(canvas, dx, dy);
            } else if (pointers.size >= 2) {
                updateGesture();
            }
        });

        function endPointer(e) {
            pointers.delete(e.pointerId);
            if (pointers.size < 2) {
                gesture = null;
            } else {
                startGesture(canvas);
            }
        }

        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);
        canvas.addEventListener('pointerleave', function() {});
    }

    function setupInteractions() {
        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            attachInteractions(canvas);
        });
    }

    function buildChannelControls() {
        for (let i = 0; i < 3; i++) {
            div = document.querySelector(`#channel${i}`);
            let ti_name = document.createElement('input');
            ti_name.type = 'text';
            ti_name.placeholder = `Channel ${i + 1}`;
            ti_name.classList.add('form-control');
            ti_name.classList.add('mb-3');
            div.append(ti_name);

            for (let k = 0; k < 4; k++) {
                let container = document.createElement('div');
                container.classList.add('input-pair');
                let input = document.createElement('input');
                input.type = 'number';
                input.classList.add('form-control');
                input.min = '-1.0';
                input.max = '1.0';
                input.step = '0.001';
                input.value = base1[k + i * 4];
                container.append(input);
                const bases = [base1, base2, base3];
                const isOffset = k === 3;
                const min = isOffset ? -128 : -1;
                const max = isOffset ? 127 : 1;
                const step = isOffset ? 1 : 0.1;

                input.min = String(min);
                input.max = String(max);
                input.step = String(step);
                input.value = String(bases[i][k]);

                let slider = document.createElement('input');
                slider.type = 'range';
                slider.classList.add('form-range');
                slider.min = String(min);
                slider.max = String(max);
                slider.step = String(step);
                slider.value = input.value;
                container.append(slider);
                div.append(container);

                function commitBasisValue(rawValue) {
                    let val = parseFloat(rawValue);
                    if (isNaN(val)) return;

                    val = Math.max(min, Math.min(max, val));
                    bases[i][k] = val;

                    input.value = String(val);
                    slider.value = String(val);

                    inverseBasis = null;
                    updateInverseBasis();
                    decomposeImage();
                    renderAll();
                }

                input.addEventListener('input', function() {
                    slider.value = input.value;
                });

                input.addEventListener('change', function() {
                    commitBasisValue(input.value);
                });

                slider.addEventListener('input', function() {
                    input.value = slider.value;
                    commitBasisValue(slider.value);
                });
            }
        }
    }

    window.addEventListener('resize', handleResize);

    document.addEventListener('DOMContentLoaded', function() {
        handleResize();
        setupInteractions();

        let base_image = document.getElementById('base_image');

        base_image.addEventListener('load', function() {
            width = base_image.naturalWidth;
            height = base_image.naturalHeight;

            // Prepare full-res buffers
            Object.values(buffers).forEach(c => {
                c.width = width;
                c.height = height;
            });

            // Draw source image into full-res source buffer
            let ctx = buffers.source.getContext('2d');
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(base_image, 0, 0, width, height);

            updateInverseBasis();
            decomposeImage();
            resetView();
        });

        buildChannelControls();

        // loadImage('jpeg/44.jpg');
        loadImage('jpeg/91.jpg');
    });
</script>
