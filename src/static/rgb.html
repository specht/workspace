<link rel="stylesheet" href="include/knob.css">
<script src="include/knob.js"></script>

<style>
    body {
        margin: 0;
        background-color: #1c1d21;
        overflow: hidden;
        color: white;
        font-family: sans-serif;
    }

    .menu, .header, footer {
        display: none;
    }

    #app_shell {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    .panel_container {
        position: absolute;
        display: flex;
        flex-direction: column;
        justify-content: center;
        /* outline: 1px solid #444; */
        background: #050607;
        border-radius: 8px;
        box-sizing: border-box;
        padding: 16px 8px 8px 8px;
    }

    .result_container {
        position: absolute;
        /* outline: 1px solid #444; */
        background: #1c1d21;
        border-radius: 8px;
        overflow: hidden;
    }

    .knob-stack {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

    #mix_svg,
    #cube_svg {
        width: 100%;
        height: 100%;
        display: block;
        /* background: linear-gradient(90deg, #191b22 0%, #1b1d24 100%); */
        background: #111;
    }

    .result-label {
        position: absolute;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.45);
        color: white;
        font: 12px sans-serif;
        padding: 6px 10px;
        border-radius: 6px;
        backdrop-filter: blur(8px);
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
    }

    .swatch {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 54px;
        height: 54px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .panel-title {
        position: absolute;
        top: 10px;
        left: 12px;
        font: 12px sans-serif;
        color: rgba(255,255,255,0.8);
        letter-spacing: 0.04em;
        user-select: none;
        pointer-events: none;
        z-index: 2;
    }

    #cube_view {
        touch-action: none;
        cursor: grab;
    }

    #cube_view.dragging {
        cursor: grabbing;
    }

    .swatch-palette {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.08);
        width: 100%;
    }

    .swatch-palette-title {
        font: 11px sans-serif;
        color: rgba(255,255,255,0.7);
        letter-spacing: 0.04em;
        user-select: none;
    }

    .swatch-grid {
        display: grid;
        grid-template-columns: repeat(2, 28px);
        gap: 8px;
        justify-content: center;
    }

    .mini-swatch {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        cursor: pointer;
        transition: transform 0.08s ease, border-color 0.08s ease;
    }

    .mini-swatch:hover {
        transform: scale(1.08);
        border-color: rgba(255,255,255,0.45);
    }

    .mini-swatch.active {
        border-color: rgba(255,255,255,0.95);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.35), 0 2px 10px rgba(0,0,0,0.35);
    }
</style>

<div id="app_shell">
    <div class="panel_container" id="rgb_controls">
        <div class="knob-stack" id="knob_stack"></div>
        <div class="swatch-palette" id="swatch_palette">
            <div class="swatch-palette-title">Swatches</div>
            <div class="swatch-grid" id="swatch_grid"></div>
        </div>
    </div>

    <div class="result_container" id="result_view">
        <div class="panel-title">RGB color mix</div>

        <svg id="mix_svg" viewBox="0 0 1000 700"
            preserveAspectRatio="xMidYMid meet">
            <defs>
                <circle id="geom_r" cx="430" cy="300" r="150"></circle>
                <circle id="geom_g" cx="570" cy="300" r="150"></circle>
                <circle id="geom_b" cx="500" cy="430" r="150"></circle>

                <circle id="geom_r_fill" cx="430" cy="300" r="150"></circle>
                <circle id="geom_g_fill" cx="570" cy="300" r="150"></circle>
                <circle id="geom_b_fill" cx="500" cy="430" r="150"></circle>

                <mask id="mask_r_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_r" fill="white"></use>
                    <use href="#geom_g" fill="black"></use>
                    <use href="#geom_b" fill="black"></use>
                </mask>

                <mask id="mask_g_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_g" fill="white"></use>
                    <use href="#geom_r" fill="black"></use>
                    <use href="#geom_b" fill="black"></use>
                </mask>

                <mask id="mask_b_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_b" fill="white"></use>
                    <use href="#geom_r" fill="black"></use>
                    <use href="#geom_g" fill="black"></use>
                </mask>

                <mask id="mask_rg_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_r" fill="white"></use>
                    <use href="#geom_g" fill="white"></use>
                    <use href="#geom_b" fill="black"></use>
                </mask>
                <clippath id="clip_rg">
                    <use href="#geom_r"></use>
                </clippath>

                <mask id="mask_rb_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_r" fill="white"></use>
                    <use href="#geom_b" fill="white"></use>
                    <use href="#geom_g" fill="black"></use>
                </mask>
                <clippath id="clip_rb">
                    <use href="#geom_r"></use>
                </clippath>

                <mask id="mask_gb_only" maskUnits="userSpaceOnUse">
                    <rect width="1000" height="700" fill="black"></rect>
                    <use href="#geom_g" fill="white"></use>
                    <use href="#geom_b" fill="white"></use>
                    <use href="#geom_r" fill="black"></use>
                </mask>
                <clippath id="clip_gb">
                    <use href="#geom_g"></use>
                </clippath>

                <clippath id="clip_rgb_center_a">
                    <use href="#geom_r"></use>
                </clippath>
                <clippath id="clip_rgb_center_b">
                    <use href="#geom_g"></use>
                </clippath>
            </defs>

            <use id="patch_r_only"
                href="#geom_r_fill"
                mask="url(#mask_r_only)"
                fill="rgb(255,0,0)"></use>

            <use id="patch_g_only"
                href="#geom_g_fill"
                mask="url(#mask_g_only)"
                fill="rgb(0,255,0)"></use>

            <use id="patch_b_only"
                href="#geom_b_fill"
                mask="url(#mask_b_only)"
                fill="rgb(0,0,255)"></use>

            <g clip-path="url(#clip_rg)">
                <use id="patch_rg_only"
                    href="#geom_g_fill"
                    mask="url(#mask_rg_only)"
                    fill="rgb(255,255,0)"></use>
            </g>

            <g clip-path="url(#clip_rb)">
                <use id="patch_rb_only"
                    href="#geom_b_fill"
                    mask="url(#mask_rb_only)"
                    fill="rgb(255,0,255)"></use>
            </g>

            <g clip-path="url(#clip_gb)">
                <use id="patch_gb_only"
                    href="#geom_b_fill"
                    mask="url(#mask_gb_only)"
                    fill="rgb(0,255,255)"></use>
            </g>

            <g clip-path="url(#clip_rgb_center_a)">
                <g clip-path="url(#clip_rgb_center_b)">
                    <use id="patch_rgb"
                        href="#geom_b_fill"
                        fill="rgb(255,255,255)"></use>
                </g>
            </g>
        </svg>

        <div class="swatch" id="color_swatch"></div>
        <div class="result-label" id="color_label">rgb(255, 255, 255)</div>
    </div>

    <div class="result_container" id="cube_view">
        <div class="panel-title" id="cube_title">3D color location</div>
        <svg id="cube_svg" viewBox="0 0 1000 700"
            preserveAspectRatio="xMidYMid meet"></svg>
        <div class="result-label" id="cube_label">drag to rotate</div>
    </div>
</div>

<script type="module">
    import { VectorSpaceCube } from './include/vector-space-cube.js';

    let hpadding = 32;
    let vpadding = 20;
    let margin = 20;

    let knobs = [];
    let cube = null;

    let rgb = {
        r: 90,
        g: 211,
        b: 255,
    };

    let colorMode = 'RGB';

    const BASES = {
        RGB: [
            { name: 'R', color: '#ea2830', vector: { x: 1, y: 0, z: 0 } },
            { name: 'G', color: '#73d216', vector: { x: 0, y: 1, z: 0 } },
            { name: 'B', color: '#238acc', vector: { x: 0, y: 0, z: 1 } }
        ],
        YCbCr: [
            { name: 'Y',   color: '#f4f1de', vector: { x: 1.000000, y: 1.000000, z: 1.000000 } },
            { name: 'Cb′', color: '#4cc9f0', vector: { x: 0.000000, y: -0.344136, z: 1.772000 } },
            { name: 'Cr′', color: '#f72585', vector: { x: 1.402000, y: -0.714136, z: 0.000000 } }
        ],
        XYZ: [
            { name: 'X', color: '#ff6b6b', vector: { x: 0.4124, y: 0.3576, z: 0.1805 } },
            { name: 'Y', color: '#f7d154', vector: { x: 0.2126, y: 0.7152, z: 0.0722 } },
            { name: 'Z', color: '#5da9ff', vector: { x: 0.0193, y: 0.1192, z: 0.9505 } }
        ]
    };

    const MODE_ORDER = ['RGB', 'YCbCr'];

    const PRESET_HTML_COLORS = [
        'black',
        'white',
        '#f00',
        '#ea2830',
        '#0f0',
        '#80bc42',
        '#00f',
        '#238acc',
        '#0ff',
        '#7dcdc2',
        '#f0f',
        '#f384ae',
        '#ff0',
        '#fad31c',
    ];

    let circleRadius = 150;
    let circleSpread = 40;

    let baseColors = {
        'R': '#ea2830',
        'G': '#73d216',
        'B': '#238acc',
        'M': '#d9d9d9'
    };

    function parseCssColorToRgb(color) {
        const probe = document.createElement('div');
        probe.style.color = color;
        document.body.appendChild(probe);

        const computed = getComputedStyle(probe).color;
        document.body.removeChild(probe);

        const match = computed.match(/rgba?\(\s*([0-9]+)[,\s]+([0-9]+)[,\s]+([0-9]+)/i);
        if (!match) {
            return { r: 0, g: 0, b: 0 };
        }

        return {
            r: clampByte(Number(match[1])),
            g: clampByte(Number(match[2])),
            b: clampByte(Number(match[3]))
        };
    }

    function setRgbColor(nextRgb) {
        rgb.r = clampByte(nextRgb.r);
        rgb.g = clampByte(nextRgb.g);
        rgb.b = clampByte(nextRgb.b);

        syncKnobsToRGB();
        updatePatches();
    }

    function buildSwatches() {
        const grid = document.getElementById('swatch_grid');
        if (!grid) return;

        grid.innerHTML = '';

        PRESET_HTML_COLORS.forEach((colorName) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'mini-swatch';
            btn.title = colorName;
            btn.setAttribute('aria-label', colorName);
            btn.style.background = colorName;

            btn.addEventListener('click', () => {
                const next = parseCssColorToRgb(colorName);
                setRgbColor(next);
                updateSwatchSelection();
            });

            grid.appendChild(btn);
        });

        updateSwatchSelection();
    }

    function updateSwatchSelection() {
        const grid = document.getElementById('swatch_grid');
        if (!grid) return;

        const current = rgbString(rgb.r, rgb.g, rgb.b).replace(/\s+/g, '');

        [...grid.children].forEach((el) => {
            const probeRgb = parseCssColorToRgb(el.title);
            const probe = rgbString(probeRgb.r, probeRgb.g, probeRgb.b).replace(/\s+/g, '');

            if (probe === current) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }

    function clampByte(v) {
        return Math.max(0, Math.min(255, Math.round(v)));
    }

    function rgbString(r, g, b) {
        return `rgb(${r}, ${g}, ${b})`;
    }

    function applyCubeBasis() {
        if (!cube) return;
        cube.setBasis(BASES[colorMode]);
        const label = document.getElementById('cube_label');
        if (label) {
            label.textContent = `drag to rotate · ${colorMode}`;
        }
        updateCubeTitle();
    }

    function updateCircleGeometry() {
        const cx = 500;
        const cy = 350;
        const r = circleRadius;
        const d = circleSpread;
        const EPS = 0.1;

        const positions = {
            r: { x: cx - d, y: cy - d * 0.60 },
            g: { x: cx + d, y: cy - d * 0.60 },
            b: { x: cx,     y: cy + d * 0.92 }
        };

        const setCircle = (id, p, radius) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.setAttribute('cx', p.x);
            el.setAttribute('cy', p.y);
            el.setAttribute('r', radius);
        };

        setCircle('geom_r', positions.r, r);
        setCircle('geom_g', positions.g, r);
        setCircle('geom_b', positions.b, r);

        setCircle('geom_r_fill', positions.r, r + EPS);
        setCircle('geom_g_fill', positions.g, r + EPS);
        setCircle('geom_b_fill', positions.b, r + EPS);
    }

    function syncKnobsToRGB() {
        if (knobs[0]) knobs[0].setValue(rgb.r);
        if (knobs[1]) knobs[1].setValue(rgb.g);
        if (knobs[2]) knobs[2].setValue(rgb.b);
    }

    function syncModeKnob() {
        if (!knobs[3]) return;
        knobs[3].setValue(MODE_ORDER.indexOf(colorMode));
    }

    function syncCubeToRGB() {
        if (!cube) return;
        cube.setValue({
            x: rgb.r / 255,
            y: rgb.g / 255,
            z: rgb.b / 255
        }, { silent: true });
    }

    function updatePatches() {
        const r = rgb.r;
        const g = rgb.g;
        const b = rgb.b;

        const colors = {
            r_only:  rgbString(r, 0, 0),
            g_only:  rgbString(0, g, 0),
            b_only:  rgbString(0, 0, b),
            rg_only: rgbString(r, g, 0),
            rb_only: rgbString(r, 0, b),
            gb_only: rgbString(0, g, b),
            rgb:     rgbString(r, g, b)
        };

        const strokeWidth = 0.0;

        const setPatchColor = (id, fill) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.setAttribute('fill', fill);
            el.setAttribute('stroke', fill);
            el.setAttribute('stroke-width', strokeWidth);
            el.setAttribute('stroke-linejoin', 'round');
            el.setAttribute('stroke-linecap', 'round');
            el.setAttribute('paint-order', 'stroke fill');
            el.setAttribute('vector-effect', 'non-scaling-stroke');
        };

        setPatchColor('patch_r_only', colors.r_only);
        setPatchColor('patch_g_only', colors.g_only);
        setPatchColor('patch_b_only', colors.b_only);
        setPatchColor('patch_rg_only', colors.rg_only);
        setPatchColor('patch_rb_only', colors.rb_only);
        setPatchColor('patch_gb_only', colors.gb_only);
        setPatchColor('patch_rgb', colors.rgb);

        document.getElementById('color_swatch').style.background = colors.rgb;
        updateCoordinateLabel();
        syncCubeToRGB();
        updateSwatchSelection();
    }

    function handleResize() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;

        const scaleFactor = Math.min(1.0, 1060.0 / windowHeight);
        const knobPanelW = 120 * scaleFactor;

        const fullH = windowHeight - 2 * margin;
        const contentX = margin + knobPanelW + hpadding;
        const contentW = windowWidth - contentX - margin;

        const panelGap = hpadding;
        const panelW = (contentW - panelGap) / 2;

        let div = document.getElementById('rgb_controls');
        div.style.left = `${margin}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${knobPanelW}px`;
        div.style.height = `${fullH}px`;

        div = document.getElementById('result_view');
        div.style.left = `${contentX}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${panelW}px`;
        div.style.height = `${fullH}px`;

        div = document.getElementById('cube_view');
        div.style.left = `${contentX + panelW + panelGap}px`;
        div.style.top = `${margin}px`;
        div.style.width = `${panelW}px`;
        div.style.height = `${fullH}px`;

        if (cube) cube.resize();
    }

    function buildControls() {
        const knobStack = document.getElementById('knob_stack');
        knobStack.innerHTML = '';
        knobs = [];

        const channelConfigs = [
            { key: 'r', label: 'R' },
            { key: 'g', label: 'G' },
            { key: 'b', label: 'B' }
        ];

        for (const cfg of channelConfigs) {
            const holder = document.createElement('div');
            knobStack.appendChild(holder);

            const knob = new FancyKnob(holder, {
                label: cfg.label,
                min: 0,
                max: 255,
                step: 1,
                value: rgb[cfg.key],
                color: baseColors[cfg.label],
                centerLabel: '0',
                size: 76,
                horizontal: false,
                indicatorStyle: 'arc',
                ticks: [
                    { value: 0, major: true, label: '0' },
                    { value: 16 },
                    { value: 32 },
                    { value: 48 },
                    { value: 64, major: true, label: '64' },
                    { value: 80 },
                    { value: 96 },
                    { value: 112 },
                    { value: 128, major: true, label: '128' },
                    { value: 144 },
                    { value: 160 },
                    { value: 176 },
                    { value: 192, major: true, label: '192' },
                    { value: 208 },
                    { value: 224 },
                    { value: 240 },
                    { value: 255, major: true, label: '255' }
                ],
                formatValue: (v) => v,
                onInput: (v) => {
                    rgb[cfg.key] = clampByte(v);
                    updatePatches();
                }
            });

            knobs.push(knob);
        }

        const modeHolder = document.createElement('div');
        knobStack.appendChild(modeHolder);

        const modeKnob = new FancyKnob(modeHolder, {
            label: 'Mode',
            min: 0,
            max: MODE_ORDER.length - 1,
            step: 1,
            value: MODE_ORDER.indexOf(colorMode),
            color: baseColors.M,
            centerLabel: '',
            size: 76,
            horizontal: false,
            indicatorStyle: 'dot',
            sweepStart: -30,
            sweepEnd: 30,
            ticks: MODE_ORDER.map((mode, i) => ({
                value: i,
                major: true,
                label: mode
            })),
            formatValue: (v) => MODE_ORDER[Math.round(v)] ?? MODE_ORDER[0],
            onInput: (v) => {
                const nextMode = MODE_ORDER[Math.round(v)] ?? MODE_ORDER[0];
                if (nextMode === colorMode) return;
                colorMode = nextMode;
                applyCubeBasis();
                syncModeKnob();
            }
        });

        knobs.push(modeKnob);
    }

    function buildCube() {
        cube = new VectorSpaceCube({
            svg: document.getElementById('cube_svg'),
            labelEl: document.getElementById('cube_label'),
            value: {
                x: rgb.r / 255,
                y: rgb.g / 255,
                z: rgb.b / 255
            },
            basis: BASES[colorMode],
            state: {
                yaw: -0.45,
                pitch: 0.50,
                zoom: 1.0,
                minZoom: 0.55,
                maxZoom: 2.5,
                pointGrabRadius: 18
            },
            onChange: ({ value, coefficients }) => {
                rgb.r = clampByte(value.x * 255);
                rgb.g = clampByte(value.y * 255);
                rgb.b = clampByte(value.z * 255);
                syncKnobsToRGB();
                updatePatches();
                updateCoordinateLabel(coefficients);
            }
        });
    }

    function formatFixed(v) {
        return (Math.abs(v) < 1e-9 ? 0 : v).toFixed(2).replace('-', '−');
    }

    function updateCoordinateLabel(coeffs = null) {
        const rgbText = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

        if (!cube) {
            document.getElementById('color_label').textContent = rgbText;
            return;
        }

        const c = coeffs || cube.getCoefficients();

        if (colorMode === 'RGB') {
            document.getElementById('color_label').textContent =
                `${rgbText} · R=${formatFixed(c.x)} G=${formatFixed(c.y)} B=${formatFixed(c.z)}`;
            return;
        }

        if (colorMode === 'YCbCr') {
            const Y = c.x;
            const CbPrime = c.y;
            const CrPrime = c.z;

            const CbJpeg = CbPrime + 0.5;
            const CrJpeg = CrPrime + 0.5;

            const Y8  = clampByte(Y * 255);
            const Cb8 = clampByte((CbPrime + 0.5) * 255);
            const Cr8 = clampByte((CrPrime + 0.5) * 255);

            document.getElementById('color_label').textContent =
                `${rgbText} · Y=${formatFixed(Y)} Cb′=${formatFixed(CbPrime)} Cr′=${formatFixed(CrPrime)} · bytes(${Y8}, ${Cb8}, ${Cr8})`;        }
    }

    function updateCubeTitle() {
        const el = document.getElementById('cube_title');
        if (!el) return;

        if (colorMode === 'RGB') {
            el.textContent = '3D RGB space';
        } else if (colorMode === 'YCbCr') {
            el.textContent = "3D YCbCr space";
        }
    }

    window.addEventListener('resize', handleResize);

    document.addEventListener('DOMContentLoaded', function() {
        buildControls();
        buildSwatches();
        buildCube();
        handleResize();
        updateCircleGeometry();
        updatePatches();
        applyCubeBasis();
        syncModeKnob();
        updateCubeTitle();
    });
</script>
