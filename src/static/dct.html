<script>
    let isLeftPanelOpen = false;

    let hpadding = 32;
    let vpadding = 10;
    let margin = 10;

    let width = 1;
    let height = 1;

    let appMode = '1d';

    const basisCache = {
        '1d': null,
        '2d': null
    };

    const selectionState = {
        hover: null,
        selected: null
    };

    let knobs = [];

    const viewState = {
        zoom: 1,
        minZoom: 1,
        maxZoom: 64,
        cx: 0,
        cy: 0
    };

    const pointers = new Map();
    let gesture = null;
    let renderQueued = false;

    const viewIds = ['source', 'channel_view', 'reconstructed_view'];

    const buffers = {
        source: document.createElement('canvas'),
        channel_view: document.createElement('canvas'),
        reconstructed_view: document.createElement('canvas')
    };

    const bufferContexts = {
        source: buffers.source.getContext('2d', { willReadFrequently: true }),
        channel_view: buffers.channel_view.getContext('2d', { willReadFrequently: true }),
        reconstructed_view: buffers.reconstructed_view.getContext('2d', { willReadFrequently: true })
    };

    const visibleContexts = {};

    let currentChannel = 1;

    let coefficientsKnob = null;
    let coefficientCount = 64;
    let zigZagOrderCache = null;
    let zigZagRankCache = null;

    const DCT_N = 8;
    const dctTables = {
        alpha: new Float32Array(DCT_N),
        cos: Array.from({ length: DCT_N }, () => new Float32Array(DCT_N))
    };

    const reconstructionCache = {
        valid: false,
        mode: null,
        channel: null,
        width: 0,
        height: 0,
        anchorX: 0,
        anchorY: 0,
        blockW: 0,
        blockH: 0,
        blocks: []
    };

    const selectedBlockCache = {
        key: null,
        values: null,
        shifted: null,
        coeffs: null,
        reconstructed: new Map()
    };

    let coefficientRenderPending = false;
    let pendingCoefficientCount = coefficientCount;

    function invalidateReconstructionCache() {
        reconstructionCache.valid = false;
        reconstructionCache.blocks = [];
    }

    function invalidateSelectedBlockCache() {
        selectedBlockCache.key = null;
        selectedBlockCache.values = null;
        selectedBlockCache.shifted = null;
        selectedBlockCache.coeffs = null;
        selectedBlockCache.reconstructed = new Map();
    }

    function buildDctTables() {
        for (let k = 0; k < DCT_N; k++) {
            dctTables.alpha[k] = k === 0 ? Math.sqrt(1 / DCT_N) : Math.sqrt(2 / DCT_N);
            for (let n = 0; n < DCT_N; n++) {
                dctTables.cos[k][n] = Math.cos((Math.PI / DCT_N) * (n + 0.5) * k);
            }
        }
    }

    function getLeftPanelWidth() {
        const panel = document.getElementById('left_panel');
        return panel ? panel.getBoundingClientRect().width : 0;
    }

    function openLeftPanel() {
        document.getElementById('left_panel_open_btn').style.display = 'none';
        document.getElementById('backdrop').classList.add('visible');

        const panel = document.getElementById('left_panel');
        if (!panel) return;

        isLeftPanelOpen = true;
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');

        const width = getLeftPanelWidth();
        document.documentElement.style.setProperty('--side-panel-offset', `${width}px`);
    }

    function closeLeftPanel() {
        document.getElementById('left_panel_open_btn').style.display = 'block';
        document.getElementById('backdrop').classList.remove('visible');

        const panel = document.getElementById('left_panel');
        if (!panel) return;

        isLeftPanelOpen = false;
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');

        document.documentElement.style.setProperty('--side-panel-offset', `0px`);
    }

    function getSelectionSize() {
        return appMode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };
    }

    function clampSelectionOrigin(x, y, blockW, blockH) {
        return {
            x: Math.max(0, Math.min(width - blockW, x)),
            y: Math.max(0, Math.min(height - blockH, y))
        };
    }

    function getSelectionAtImagePoint(ix, iy) {
        if (!width || !height) return null;

        const { w: blockW, h: blockH } = getSelectionSize();

        const px = Math.floor(ix - blockW / 2 + 0.5);
        const py = Math.floor(iy - blockH / 2 + 0.5);

        return clampSelectionOrigin(px, py, blockW, blockH);
    }

    function drawSelectionOverlay(viewId, ctx, visibleCanvas) {
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;
        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        function drawPixelGrid(rx, ry, rw, rh, blockW, blockH, color, alpha) {
            if (viewState.zoom < 8) return;

            ctx.save();
            ctx.beginPath();

            for (let i = 1; i < blockW; i++) {
                const gx = rx + i * scale;
                ctx.moveTo(gx + 0.5, ry);
                ctx.lineTo(gx + 0.5, ry + rh);
            }

            for (let j = 1; j < blockH; j++) {
                const gy = ry + j * scale;
                ctx.moveTo(rx, gy + 0.5);
                ctx.lineTo(rx + rw, gy + 0.5);
            }

            ctx.lineWidth = 1;
            ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            ctx.stroke();
            ctx.restore();
        }

        function drawRect(sel, opts) {
            if (!sel) return;

            const { w: blockW, h: blockH } = getSelectionSize();

            const rx = Math.round((sel.x - sx) * scale);
            const ry = Math.round((sel.y - sy) * scale);
            const rw = Math.round(blockW * scale);
            const rh = Math.round(blockH * scale);

            ctx.save();

            if (opts.dash) {
                ctx.setLineDash(opts.dash);
            } else {
                ctx.setLineDash([]);
            }

            if (opts.fill) {
                ctx.fillStyle = opts.fill;
                ctx.fillRect(rx, ry, rw, rh);
            }

            ctx.lineWidth = opts.lineWidth;
            ctx.strokeStyle = opts.stroke;
            ctx.strokeRect(rx + 0.5, ry + 0.5, rw, rh);

            drawPixelGrid(rx, ry, rw, rh, blockW, blockH, opts.gridColor, opts.gridAlpha);

            ctx.restore();
        }

        drawRect(selectionState.hover, {
            fill: 'rgba(0, 200, 255, 0.12)',
            stroke: 'rgba(0, 200, 255, 0.95)',
            lineWidth: 1,
            dash: [5, 3],
            gridColor: { r: 0, g: 200, b: 255 },
            gridAlpha: 0.45
        });

        drawRect(selectionState.selected, {
            fill: 'rgba(0, 200, 255, 0.12)',
            stroke: 'rgba(0, 200, 255, 1.0)',
            lineWidth: 2,
            dash: null,
            gridColor: { r: 0, g: 200, b: 255 },
            gridAlpha: 0.45
        });
    }

    function getCanvasDisplaySize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        return {
            w: canvas.width / dpr,
            h: canvas.height / dpr
        };
    }

    function getFitScale(canvas) {
        if (!width || !height) return 1;
        const size = getCanvasDisplaySize(canvas);
        return Math.min(size.w / width, size.h / height);
    }

    function getEffectiveScale(canvas) {
        return getFitScale(canvas) * viewState.zoom;
    }

    function resizeVisibleCanvases() {
        viewIds.forEach(id => {
            const container = document.getElementById(id);
            const canvas = container.querySelector('canvas');
            const rect = container.getBoundingClientRect();

            const dpr = window.devicePixelRatio || 1;
            const displayWidth = Math.max(1, Math.round(rect.width));
            const displayHeight = Math.max(1, Math.round(rect.height));

            canvas.width = Math.round(displayWidth * dpr);
            canvas.height = Math.round(displayHeight * dpr);
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
        });
    }

    function updateZoomLimits() {
        viewState.minZoom = 1;
        viewState.maxZoom = 64;
        viewState.zoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom || 1));
    }

    function resetView() {
        viewState.cx = width / 2;
        viewState.cy = height / 2;
        updateZoomLimits();
        viewState.zoom = 1;
        clampView();
        renderAll();
    }

    function clampView() {
        let maxHalfW = 0;
        let maxHalfH = 0;

        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            if (!canvas) return;

            const size = getCanvasDisplaySize(canvas);
            const scale = getEffectiveScale(canvas);

            const halfW = size.w / (2 * scale);
            const halfH = size.h / (2 * scale);

            maxHalfW = Math.max(maxHalfW, halfW);
            maxHalfH = Math.max(maxHalfH, halfH);
        });

        if (maxHalfW * 2 >= width) {
            viewState.cx = width / 2;
        } else {
            viewState.cx = Math.max(maxHalfW, Math.min(width - maxHalfW, viewState.cx));
        }

        if (maxHalfH * 2 >= height) {
            viewState.cy = height / 2;
        } else {
            viewState.cy = Math.max(maxHalfH, Math.min(height - maxHalfH, viewState.cy));
        }
    }

    function renderView(viewId) {
        const visibleCanvas = document.querySelector(`#${viewId} canvas`);
        if (!visibleCanvas) return;

        const ctx = visibleContexts[viewId];
        const srcCanvas = buffers[viewId];
        const dpr = window.devicePixelRatio || 1;
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, dw, dh);

        if (!srcCanvas || !srcCanvas.width || !srcCanvas.height) return;

        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        ctx.imageSmoothingEnabled = !(viewState.zoom > 4);
        ctx.imageSmoothingQuality = 'low';

        ctx.drawImage(
            srcCanvas,
            sx, sy, sw, sh,
            0, 0, dw, dh
        );

        drawSelectionOverlay(viewId, ctx, visibleCanvas);
    }

    function renderAll() {
        for (const id of viewIds) {
            renderView(id);
        }
    }

    function scheduleRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
            renderQueued = false;
            renderAll();
        });
    }

    function getSelectionCenter(sel, mode = appMode) {
        if (!sel) return null;

        const size = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        return {
            x: sel.x + size.w / 2,
            y: sel.y + size.h / 2
        };
    }

    function getSelectionFromCenter(cx, cy, mode = appMode) {
        const size = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        return clampSelectionOrigin(
            Math.floor(cx - size.w / 2),
            Math.floor(cy - size.h / 2),
            size.w,
            size.h
        );
    }

    function updateHoverSelectionFromPointer(canvas, clientX, clientY) {
        const p = screenToImage(canvas, clientX, clientY);
        selectionState.hover = getSelectionAtImagePoint(p.x, p.y);
        scheduleRender();
    }

    function clearHoverSelection() {
        if (!selectionState.hover) return;
        selectionState.hover = null;
        scheduleRender();
    }

    function commitHoverSelection() {
        if (!selectionState.hover) return;
        selectionState.selected = { ...selectionState.hover };
        invalidateReconstructionCache();
        invalidateSelectedBlockCache();
        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
        scheduleRender();
    }

    function handleResize() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;

        const scaleFactor = Math.min(1.0, 1060.0 / windowHeight);
        const knobW = 100 * scaleFactor;

        const canvasW = (windowWidth - 2 * margin - 2 * knobW - 4 * hpadding) / 3;
        const canvasH = (windowHeight - 2 * margin - 2 * vpadding) / 3;

        let div = document.getElementById('source');
        div.style.left = `${margin}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('channel_chooser');
        div.style.left = `${margin + canvasW + hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${knobW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('coefficients_chooser');
        div.style.left = `${margin + canvasW * 2 + hpadding * 3 + knobW}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${knobW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('channel_view');
        div.style.left = `${margin + canvasW + knobW + 2 * hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('reconstructed_view');
        div.style.left = `${margin + 2 * canvasW + 2 * knobW + 4 * hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

        let squareCount = 4;
        let squareSize = (windowWidth - 2 * margin - (squareCount - 1) * hpadding) / squareCount;

        div = document.getElementById('sq_input');
        div.style.left = `${margin}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_dct');
        div.style.left = `${margin + squareSize + hpadding}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_base_functions');
        div.style.left = `${margin + 2 * (squareSize + hpadding)}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_idct');
        div.style.left = `${margin + 3 * (squareSize + hpadding)}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        resizeVisibleCanvases();
        updateZoomLimits();
        clampView();
        scheduleRender();
    }

    function loadImage(src) {
        document.getElementById('base_image').src = src;
    }

    function clampByte(v) {
        return Math.max(0, Math.min(255, Math.round(v)));
    }

    function rebuildChannelBuffer() {
        const srcCanvas = buffers.source;
        const srcCtx = bufferContexts.source;
        const dstCanvas = buffers.channel_view;
        const dstCtx = bufferContexts.channel_view;

        if (!srcCanvas.width || !srcCanvas.height) return;

        dstCanvas.width = srcCanvas.width;
        dstCanvas.height = srcCanvas.height;

        const w = srcCanvas.width;
        const h = srcCanvas.height;

        const src = srcCtx.getImageData(0, 0, w, h);
        const dst = dstCtx.createImageData(w, h);

        const s = src.data;
        const d = dst.data;

        for (let i = 0; i < s.length; i += 4) {
            const r = s[i];
            const g = s[i + 1];
            const b = s[i + 2];

            const y  =  0.299 * r + 0.587 * g + 0.114 * b;
            const cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
            const cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;

            let v = y;
            if (currentChannel === 2) v = cb;
            if (currentChannel === 3) v = cr;

            v = clampByte(v);

            d[i] = v;
            d[i + 1] = v;
            d[i + 2] = v;
            d[i + 3] = 255;
        }

        dstCtx.putImageData(dst, 0, 0);
        document.getElementById('channel_label').textContent = `${['Y', 'Cb', 'Cr'][currentChannel - 1]} Channel`;

        invalidateReconstructionCache();
        invalidateSelectedBlockCache();

        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
    }

    function loadCurrentImageIntoViewer() {
        const baseImage = document.getElementById('base_image');

        width = baseImage.naturalWidth;
        height = baseImage.naturalHeight;

        Object.values(buffers).forEach(c => {
            c.width = width;
            c.height = height;
        });

        const ctx = bufferContexts.source;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(baseImage, 0, 0, width, height);

        selectionState.hover = null;
        selectionState.selected = null;

        invalidateReconstructionCache();
        invalidateSelectedBlockCache();

        rebuildChannelBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
        resetView();
    }

    function dctBasis1d(k, N = 8) {
        const a = alpha(k, N);
        const out = [];

        for (let n = 0; n < N; n++) {
            out.push(a * Math.cos((Math.PI / N) * (n + 0.5) * k));
        }

        return out;
    }

    function dctBasis2d(u, v, W = 8, H = 8) {
        const au = alpha(u, W);
        const av = alpha(v, H);

        const out = Array.from({ length: H }, () => new Array(W).fill(0));

        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                out[y][x] =
                    au * av *
                    Math.cos((Math.PI / W) * (x + 0.5) * u) *
                    Math.cos((Math.PI / H) * (y + 0.5) * v);
            }
        }

        return out;
    }

    function buildBasisCache() {
        basisCache['1d'] = [];
        for (let k = 0; k < 8; k++) {
            basisCache['1d'].push(dctBasis1d(k, 8));
        }

        basisCache['2d'] = [];
        for (let v = 0; v < 8; v++) {
            const row = [];
            for (let u = 0; u < 8; u++) {
                row.push(dctBasis2d(u, v, 8, 8));
            }
            basisCache['2d'].push(row);
        }
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function evaluateIdct1dContinuous(coeffs, x, count = 8) {
        let sum = 0;
        const limit = Math.min(count, 8);

        for (let k = 0; k < limit; k++) {
            sum += dctTables.alpha[k] * coeffs[k] * Math.cos((Math.PI / 8) * (x + 0.5) * k);
        }

        return sum + 128;
    }

    function drawContinuousReconstructionPlot(ctx, w, h, coeffs, reconstructedSamples, options = {}) {
        const axes = drawAxes(ctx, w, h, options);
        const { x0, x1, y0, y1 } = axes;

        const minY = options.minY ?? 0;
        const maxY = options.maxY ?? 255;
        const rangeY = Math.max(1e-6, maxY - minY);

        const mapX = (t) => x0 + (t / 7) * (x1 - x0);
        const mapY = (v) => y0 - ((v - minY) / rangeY) * (y0 - y1);

        // optional original/reference signal in background
        if (options.referenceValues) {
            const ref = options.referenceValues;

            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.16)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < ref.length; i++) {
                const x = mapX(i);
                const y = mapY(ref[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            for (let i = 0; i < ref.length; i++) {
                ctx.beginPath();
                ctx.arc(mapX(i), mapY(ref[i]), 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // sample guide lines
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const x = mapX(i);
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y1);
            ctx.lineTo(x + 0.5, y0);
            ctx.stroke();
        }
        ctx.restore();

        // continuous IDCT curve
        ctx.save();
        ctx.strokeStyle = options.strokeStyle || '#56a0ff';
        ctx.lineWidth = options.lineWidth || 2.5;
        ctx.beginPath();

        const steps = Math.max(256, Math.round((x1 - x0) * 1.5));
        for (let s = 0; s <= steps; s++) {
            const t = (s / steps) * 7;
            const v = evaluateIdct1dContinuous(coeffs, t, Math.min(coefficientCount, 8));
            const x = mapX(t);
            const y = mapY(v);

            if (s === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.restore();

        // discrete reconstructed samples on top
        ctx.save();
        ctx.strokeStyle = 'rgba(255,140,60,0.45)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < reconstructedSamples.length; i++) {
            const x = mapX(i);
            const y = mapY(reconstructedSamples[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.fillStyle = options.pointFillStyle || '#ff8c3c';
        for (let i = 0; i < reconstructedSamples.length; i++) {
            ctx.beginPath();
            ctx.arc(mapX(i), mapY(reconstructedSamples[i]), 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }    

    function getDctCellStyle(v, maxAbs) {
        const base = { r: 28, g: 29, b: 33 };

        if (maxAbs < 1e-9) {
            return {
                background: `rgb(${base.r}, ${base.g}, ${base.b})`,
                color: '#f5f5f5'
            };
        }

        const t = Math.min(1, Math.abs(v) / maxAbs);
        const s = Math.pow(t, 0.6);

        const warm = { r: 255, g: 140, b: 60 };
        const cool = { r: 80,  g: 160, b: 255 };

        const target = v > 0 ? warm : v < 0 ? cool : base;

        const r = Math.round(lerp(base.r, target.r, s));
        const g = Math.round(lerp(base.g, target.g, s));
        const b = Math.round(lerp(base.b, target.b, s));

        const bg = `rgb(${r}, ${g}, ${b})`;
        const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

        return {
            background: bg,
            color: luminance > 140 ? '#111' : '#f5f5f5'
        };
    }

    function getBasisCellStyle(v, maxAbs = 1) {
        const base = { r: 28, g: 29, b: 33 };
        const warm = { r: 255, g: 140, b: 60 };
        const cool = { r: 80, g: 160, b: 255 };

        const t = Math.min(1, Math.abs(v) / maxAbs);
        const s = Math.pow(t, 0.9);

        const target = v > 0 ? warm : v < 0 ? cool : base;

        const r = Math.round(lerp(base.r, target.r, s));
        const g = Math.round(lerp(base.g, target.g, s));
        const b = Math.round(lerp(base.b, target.b, s));

        return `rgb(${r}, ${g}, ${b})`;
    }

    function alpha(k, n) {
        return k === 0 ? Math.sqrt(1 / n) : Math.sqrt(2 / n);
    }

    function dct1dFast(vec) {
        const out = new Float32Array(8);

        for (let k = 0; k < 8; k++) {
            let sum = 0;
            const cosk = dctTables.cos[k];
            for (let n = 0; n < 8; n++) {
                sum += vec[n] * cosk[n];
            }
            out[k] = dctTables.alpha[k] * sum;
        }

        return out;
    }

    function dct2dFast(block) {
        const temp = Array.from({ length: 8 }, () => new Float32Array(8));
        const out = Array.from({ length: 8 }, () => new Float32Array(8));

        for (let y = 0; y < 8; y++) {
            for (let u = 0; u < 8; u++) {
                let sum = 0;
                const cosu = dctTables.cos[u];
                for (let x = 0; x < 8; x++) {
                    sum += block[y][x] * cosu[x];
                }
                temp[y][u] = dctTables.alpha[u] * sum;
            }
        }

        for (let u = 0; u < 8; u++) {
            for (let v = 0; v < 8; v++) {
                let sum = 0;
                const cosv = dctTables.cos[v];
                for (let y = 0; y < 8; y++) {
                    sum += temp[y][u] * cosv[y];
                }
                out[v][u] = dctTables.alpha[v] * sum;
            }
        }

        return out;
    }

    function idct1dFast(coeffs, count = 8) {
        const out = new Float32Array(8);

        for (let n = 0; n < 8; n++) {
            let sum = 0;
            for (let k = 0; k < count; k++) {
                sum += dctTables.alpha[k] * coeffs[k] * dctTables.cos[k][n];
            }
            out[n] = sum;
        }

        return out;
    }

    function idct2dFast(coeffs, count = 64) {
        const temp = Array.from({ length: 8 }, () => new Float32Array(8));
        const out = Array.from({ length: 8 }, () => new Float32Array(8));
        const zigzag = getZigZagOrder8x8();

        const active = Array.from({ length: 8 }, () => new Float32Array(8));
        for (let i = 0; i < Math.min(count, 64); i++) {
            const { x, y } = zigzag[i];
            active[y][x] = coeffs[y][x];
        }

        for (let y = 0; y < 8; y++) {
            for (let u = 0; u < 8; u++) {
                let sum = 0;
                for (let v = 0; v < 8; v++) {
                    sum += dctTables.alpha[v] * active[v][u] * dctTables.cos[v][y];
                }
                temp[y][u] = sum;
            }
        }

        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                let sum = 0;
                for (let u = 0; u < 8; u++) {
                    sum += dctTables.alpha[u] * temp[y][u] * dctTables.cos[u][x];
                }
                out[y][x] = sum;
            }
        }

        return out;
    }

    function getSelectedBlockCacheKey() {
        const sel = selectionState.selected || selectionState.hover;
        if (!sel) return null;
        return `${appMode}:${currentChannel}:${sel.x}:${sel.y}`;
    }

    function getSelectedBlockValues() {
        const key = getSelectedBlockCacheKey();
        if (!key) return null;

        if (selectedBlockCache.key === key && selectedBlockCache.values) {
            return selectedBlockCache.values;
        }

        const sel = selectionState.selected || selectionState.hover;
        if (!sel) return null;

        const { w, h } = getSelectionSize();
        const ctx = bufferContexts.channel_view;
        const img = ctx.getImageData(sel.x, sel.y, w, h);
        const values = [];

        for (let row = 0; row < h; row++) {
            const line = new Array(w);
            for (let col = 0; col < w; col++) {
                const i = (row * w + col) * 4;
                line[col] = img.data[i];
            }
            values.push(line);
        }

        selectedBlockCache.key = key;
        selectedBlockCache.values = values;
        selectedBlockCache.shifted = null;
        selectedBlockCache.coeffs = null;
        selectedBlockCache.reconstructed = new Map();

        return values;
    }

    function getSelectedBlockShiftedValues() {
        const key = getSelectedBlockCacheKey();
        if (!key) return null;

        if (selectedBlockCache.key === key && selectedBlockCache.shifted) {
            return selectedBlockCache.shifted;
        }

        const values = getSelectedBlockValues();
        if (!values) return null;

        const shifted = values.map(row => row.map(v => v - 128));
        selectedBlockCache.shifted = shifted;
        return shifted;
    }

    function getSelectedDctCoefficients() {
        const key = getSelectedBlockCacheKey();
        if (!key) return null;

        if (selectedBlockCache.key === key && selectedBlockCache.coeffs) {
            return selectedBlockCache.coeffs;
        }

        const shifted = getSelectedBlockShiftedValues();
        if (!shifted) return null;

        const coeffs = appMode === '2d'
            ? dct2dFast(shifted)
            : [dct1dFast(shifted[0])];

        selectedBlockCache.coeffs = coeffs;
        return coeffs;
    }

    function setPixelInImageData(data, w, x, y, v) {
        const i = (y * w + x) * 4;
        data[i] = v;
        data[i + 1] = v;
        data[i + 2] = v;
        data[i + 3] = 255;
    }

    function ensureReconstructionCache() {
        const sel = selectionState.selected;
        const blockW = 8;
        const blockH = appMode === '1d' ? 1 : 8;
        const anchorX = sel ? sel.x : 0;
        const anchorY = sel ? sel.y : 0;

        if (
            reconstructionCache.valid &&
            reconstructionCache.mode === appMode &&
            reconstructionCache.channel === currentChannel &&
            reconstructionCache.width === width &&
            reconstructionCache.height === height &&
            reconstructionCache.anchorX === anchorX &&
            reconstructionCache.anchorY === anchorY &&
            reconstructionCache.blockW === blockW &&
            reconstructionCache.blockH === blockH
        ) {
            return;
        }

        const srcCanvas = buffers.channel_view;
        const srcCtx = bufferContexts.channel_view;
        const w = srcCanvas.width;
        const h = srcCanvas.height;
        const src = srcCtx.getImageData(0, 0, w, h).data;

        let startX = anchorX;
        while (startX > 0) startX -= blockW;

        let startY = anchorY;
        while (startY > 0) startY -= blockH;

        const blocks = [];

        for (let y0 = startY; y0 < h; y0 += blockH) {
            for (let x0 = startX; x0 < w; x0 += blockW) {
                if (appMode === '1d') {
                    const row = new Float32Array(8);
                    for (let x = 0; x < 8; x++) {
                        const sx = Math.max(0, Math.min(w - 1, x0 + x));
                        const sy = Math.max(0, Math.min(h - 1, y0));
                        const i = (sy * w + sx) * 4;
                        row[x] = src[i] - 128;
                    }
                    blocks.push({ x0, y0, coeffs: dct1dFast(row) });
                } else {
                    const block = Array.from({ length: 8 }, () => new Float32Array(8));
                    for (let y = 0; y < 8; y++) {
                        const sy = Math.max(0, Math.min(h - 1, y0 + y));
                        for (let x = 0; x < 8; x++) {
                            const sx = Math.max(0, Math.min(w - 1, x0 + x));
                            const i = (sy * w + sx) * 4;
                            block[y][x] = src[i] - 128;
                        }
                    }
                    blocks.push({ x0, y0, coeffs: dct2dFast(block) });
                }
            }
        }

        reconstructionCache.valid = true;
        reconstructionCache.mode = appMode;
        reconstructionCache.channel = currentChannel;
        reconstructionCache.width = width;
        reconstructionCache.height = height;
        reconstructionCache.anchorX = anchorX;
        reconstructionCache.anchorY = anchorY;
        reconstructionCache.blockW = blockW;
        reconstructionCache.blockH = blockH;
        reconstructionCache.blocks = blocks;
    }

    function rebuildReconstructedBuffer() {
        const dstCanvas = buffers.reconstructed_view;
        const dstCtx = bufferContexts.reconstructed_view;
        const w = buffers.channel_view.width;
        const h = buffers.channel_view.height;

        if (!w || !h) return;

        ensureReconstructionCache();

        dstCanvas.width = w;
        dstCanvas.height = h;

        const dst = dstCtx.createImageData(w, h);
        const data = dst.data;

        for (const block of reconstructionCache.blocks) {
            if (appMode === '1d') {
                const reconstructed = idct1dFast(block.coeffs, Math.min(coefficientCount, 8));
                for (let x = 0; x < 8; x++) {
                    const dx = block.x0 + x;
                    const dy = block.y0;
                    if (dx < 0 || dx >= w || dy < 0 || dy >= h) continue;
                    setPixelInImageData(data, w, dx, dy, clampByte(reconstructed[x] + 128));
                }
            } else {
                const reconstructed = idct2dFast(block.coeffs, Math.min(coefficientCount, 64));
                for (let y = 0; y < 8; y++) {
                    const dy = block.y0 + y;
                    if (dy < 0 || dy >= h) continue;
                    for (let x = 0; x < 8; x++) {
                        const dx = block.x0 + x;
                        if (dx < 0 || dx >= w) continue;
                        setPixelInImageData(data, w, dx, dy, clampByte(reconstructed[y][x] + 128));
                    }
                }
            }
        }

        dstCtx.putImageData(dst, 0, 0);
    }

    function screenToImage(canvas, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        return {
            x: sx + (x / size.w) * sw,
            y: sy + (y / size.h) * sh
        };
    }

    function zoomAt(canvas, clientX, clientY, zoomFactor) {
        const before = screenToImage(canvas, clientX, clientY);
        const newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom * zoomFactor));
        if (newZoom === viewState.zoom) return;

        viewState.zoom = newZoom;

        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = before.x - ((px / size.w) - 0.5) * sw;
        viewState.cy = before.y - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function panByScreenDelta(canvas, dx, dy) {
        const scale = getEffectiveScale(canvas);
        viewState.cx -= dx / scale;
        viewState.cy -= dy / scale;
        clampView();
        scheduleRender();
    }

    function getTwoPointers() {
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return null;
        return [vals[0], vals[1]];
    }

    function distance(a, b) {
        const dx = a.clientX - b.clientX;
        const dy = a.clientY - b.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function midpoint(a, b) {
        return {
            clientX: (a.clientX + b.clientX) / 2,
            clientY: (a.clientY + b.clientY) / 2
        };
    }

    function startGesture(canvas) {
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const anchor = screenToImage(canvas, mid.clientX, mid.clientY);

        gesture = {
            canvas,
            startDistance: distance(p1, p2),
            startZoom: viewState.zoom,
            anchorImageX: anchor.x,
            anchorImageY: anchor.y
        };
    }

    function updateGesture() {
        if (!gesture) return;
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const newDistance = distance(p1, p2);
        if (gesture.startDistance <= 0) return;

        let newZoom = gesture.startZoom * (newDistance / gesture.startDistance);
        newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, newZoom));
        viewState.zoom = newZoom;

        const canvas = gesture.canvas;
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = mid.clientX - rect.left;
        const py = mid.clientY - rect.top;
        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = gesture.anchorImageX - ((px / size.w) - 0.5) * sw;
        viewState.cy = gesture.anchorImageY - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function attachInteractions(canvas) {
        const isSelectableCanvas =
            canvas.closest('#channel_view') !== null ||
            canvas.closest('#reconstructed_view') !== null;

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            zoomAt(canvas, e.clientX, e.clientY, factor);

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('dblclick', function(e) {
            e.preventDefault();
            zoomAt(canvas, e.clientX, e.clientY, 2);

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);

            pointers.set(e.pointerId, {
                pointerId: e.pointerId,
                clientX: e.clientX,
                clientY: e.clientY,
                prevX: e.clientX,
                prevY: e.clientY,
                downX: e.clientX,
                downY: e.clientY,
                moved: false
            });

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }

            if (pointers.size === 2) {
                startGesture(canvas);
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!pointers.has(e.pointerId)) {
                if (isSelectableCanvas) {
                    updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
                }
                return;
            }

            const p = pointers.get(e.pointerId);
            const dx = e.clientX - p.prevX;
            const dy = e.clientY - p.prevY;

            if (Math.abs(e.clientX - p.downX) > 3 || Math.abs(e.clientY - p.downY) > 3) {
                p.moved = true;
            }

            p.clientX = e.clientX;
            p.clientY = e.clientY;
            p.prevX = e.clientX;
            p.prevY = e.clientY;
            pointers.set(e.pointerId, p);

            if (pointers.size === 1 && p.moved) {
                panByScreenDelta(canvas, dx, dy);
            } else if (pointers.size >= 2) {
                updateGesture();
            }

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        });

        function endPointer(e) {
            const p = pointers.get(e.pointerId);
            const wasClick = p && !p.moved && pointers.size === 1;

            if (isSelectableCanvas && wasClick) {
                commitHoverSelection();
            }

            pointers.delete(e.pointerId);

            if (pointers.size < 2) {
                gesture = null;
            } else {
                startGesture(canvas);
            }
        }

        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);

        if (isSelectableCanvas) {
            canvas.addEventListener('pointerleave', clearHoverSelection);
        }
    }

    function setupInteractions() {
        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            visibleContexts[id] = canvas.getContext('2d');
            attachInteractions(canvas);
        });
    }

    function getCoefficientMax(mode = appMode) {
        return mode === '1d' ? 8 : 64;
    }

    function makeCoefficientTicks(max) {
        if (max === 8) {
            return [
                { value: 1, major: true },
                { value: 2, major: false },
                { value: 3, major: false },
                { value: 4, major: true },
                { value: 5, major: false },
                { value: 6, major: false },
                { value: 7, major: false },
                { value: 8, major: true }
            ];
        }

        return [
            { value: 1, major: true },
            { value: 4, major: false },
            { value: 8, major: true },
            { value: 12, major: false },
            { value: 16, major: true },
            { value: 20, major: false },
            { value: 24, major: true },
            { value: 28, major: false },
            { value: 32, major: true },
            { value: 36, major: false },
            { value: 40, major: true },
            { value: 44, major: false },
            { value: 48, major: true },
            { value: 52, major: false },
            { value: 56, major: true },
            { value: 60, major: false },
            { value: 64, major: true }
        ];
    }

    function scheduleCoefficientUpdate(v) {
        pendingCoefficientCount = v;
        if (coefficientRenderPending) return;

        coefficientRenderPending = true;
        requestAnimationFrame(() => {
            coefficientRenderPending = false;
            coefficientCount = pendingCoefficientCount;
            rebuildReconstructedBuffer();
            renderSqDct();
            renderSqBaseFunctions();
            renderSqIdct();
            scheduleRender();
        });
    }

    function updateCoefficientsKnobForMode() {
        const max = getCoefficientMax(appMode);
        coefficientCount = Math.min(coefficientCount, max);
        pendingCoefficientCount = coefficientCount;

        if (coefficientsKnob) {
            coefficientsKnob.updateOptions({
                min: 1,
                max,
                step: 1,
                value: coefficientCount,
                ticks: makeCoefficientTicks(max),
                bipolar: false,
                formatValue: (v) => v
            });
        }

        rebuildReconstructedBuffer();
        renderSqDct();
        renderSqBaseFunctions();
        renderSqIdct();
    }

    function getZigZagOrder8x8() {
        if (zigZagOrderCache) return zigZagOrderCache;

        const order = [];
        const N = 8;

        for (let s = 0; s <= 14; s++) {
            if (s % 2 === 0) {
                let y = Math.min(s, N - 1);
                let x = s - y;

                while (y >= 0 && x < N) {
                    order.push({ x, y });
                    x++;
                    y--;
                }
            } else {
                let x = Math.min(s, N - 1);
                let y = s - x;

                while (x >= 0 && y < N) {
                    order.push({ x, y });
                    x--;
                    y++;
                }
            }
        }

        zigZagOrderCache = order;
        return order;
    }

    function getZigZagRank8x8() {
        if (zigZagRankCache) return zigZagRankCache;
        zigZagRankCache = Array.from({ length: 8 }, () => new Int16Array(8));
        const order = getZigZagOrder8x8();
        for (let i = 0; i < order.length; i++) {
            zigZagRankCache[order[i].y][order[i].x] = i;
        }
        return zigZagRankCache;
    }

    function isCoefficientActive(x, y = 0, count = coefficientCount, mode = appMode) {
        if (mode === '1d') {
            return x < count;
        }
        return getZigZagRank8x8()[y][x] < count;
    }

    function truncateCoefficients(coeffs, count = coefficientCount, mode = appMode) {
        if (!coeffs) return null;

        if (mode === '1d') {
            const out = [new Float32Array(8)];
            for (let i = 0; i < Math.min(count, 8); i++) {
                out[0][i] = coeffs[0][i];
            }
            return out;
        }

        const out = Array.from({ length: 8 }, () => new Float32Array(8));
        const zigzag = getZigZagOrder8x8();

        for (let i = 0; i < Math.min(count, 64); i++) {
            const { x, y } = zigzag[i];
            out[y][x] = coeffs[y][x];
        }

        return out;
    }

    function getTruncatedDctCoefficients() {
        const coeffs = getSelectedDctCoefficients();
        if (!coeffs) return null;
        return truncateCoefficients(coeffs, coefficientCount, appMode);
    }

    function getReconstructedBlockValues() {
        const coeffs = getSelectedDctCoefficients();
        if (!coeffs) return null;

        const cacheKey = `${appMode}:${coefficientCount}`;
        if (selectedBlockCache.reconstructed.has(cacheKey)) {
            return selectedBlockCache.reconstructed.get(cacheKey);
        }

        let reconstructed;

        if (appMode === '1d') {
            reconstructed = [Array.from(idct1dFast(coeffs[0], Math.min(coefficientCount, 8)))];
        } else {
            reconstructed = idct2dFast(coeffs, Math.min(coefficientCount, 64)).map(row => Array.from(row));
        }

        const values = reconstructed.map(row => row.map(v => clampByte(v + 128)));
        selectedBlockCache.reconstructed.set(cacheKey, values);
        return values;
    }

    window.addEventListener('resize', handleResize);

    function selectionToAnchor(sel, mode) {
        if (!sel) return null;

        if (mode === '1d') {
            return {
                x: sel.x,
                y: sel.y
            };
        }

        return {
            x: sel.x,
            y: sel.y + 3
        };
    }

    function selectionFromAnchor(anchor, mode) {
        if (!anchor) return null;

        const { w, h } = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        let x = anchor.x;
        let y = anchor.y;

        if (mode === '2d') {
            y = anchor.y - 3;
        }

        return clampSelectionOrigin(x, y, w, h);
    }

    function setAppMode(mode) {
        if (mode !== '1d' && mode !== '2d') return;
        if (appMode === mode) return;

        const prevMode = appMode;

        const selectedAnchor = selectionState.selected
            ? selectionToAnchor(selectionState.selected, prevMode)
            : null;

        const hoverAnchor = selectionState.hover
            ? selectionToAnchor(selectionState.hover, prevMode)
            : null;

        appMode = mode;

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });

        selectionState.selected = selectedAnchor
            ? selectionFromAnchor(selectedAnchor, mode)
            : null;

        selectionState.hover = hoverAnchor
            ? selectionFromAnchor(hoverAnchor, mode)
            : null;

        invalidateReconstructionCache();
        invalidateSelectedBlockCache();

        updateCoefficientsKnobForMode();

        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqBaseFunctions();
        renderSqIdct();
        scheduleRender();
    }

    function getTextColorForValue(v) {
        return v >= 140 ? '#111' : '#f5f5f5';
    }

    function createHiDPICanvas(cssWidth, cssHeight) {
        const canvas = document.createElement('canvas');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.round(cssWidth * dpr));
        canvas.height = Math.max(1, Math.round(cssHeight * dpr));
        canvas.style.width = `${cssWidth}px`;
        canvas.style.height = `${cssHeight}px`;
        return canvas;
    }

    function setupCanvas2D(ctx, canvas) {
        const dpr = window.devicePixelRatio || 1;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
    }

    function drawAxes(ctx, w, h, opts = {}) {
        const padL = opts.padL ?? 28;
        const padR = opts.padR ?? 10;
        const padT = opts.padT ?? 10;
        const padB = opts.padB ?? 22;

        const x0 = padL;
        const y0 = h - padB;
        const x1 = w - padR;
        const y1 = padT;

        ctx.save();

        // panel background
        ctx.fillStyle = '#1c1d21';
        ctx.fillRect(0, 0, w, h);

        // guide lines
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;

        // horizontal midline
        const midY = padT + (h - padT - padB) / 2;
        ctx.beginPath();
        ctx.moveTo(x0, midY + 0.5);
        ctx.lineTo(x1, midY + 0.5);
        ctx.stroke();

        // axes
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.beginPath();
        ctx.moveTo(x0 + 0.5, y1);
        ctx.lineTo(x0 + 0.5, y0);
        ctx.lineTo(x1, y0 + 0.5);
        ctx.stroke();

        // x ticks for 8 samples
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        for (let i = 0; i < 8; i++) {
            const x = x0 + (i / 7) * (x1 - x0);
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y0 - 4);
            ctx.lineTo(x + 0.5, y0 + 4);
            ctx.stroke();
            ctx.fillText(String(i), x, y0 + 6);
        }

        ctx.restore();

        return { x0, y0, x1, y1, midY };
    }

    function drawSignalPlot(ctx, w, h, values, options = {}) {
        const axes = drawAxes(ctx, w, h, options);
        const { x0, x1, y0, y1 } = axes;

        const minY = options.minY ?? 0;
        const maxY = options.maxY ?? 255;
        const rangeY = Math.max(1e-6, maxY - minY);

        const mapX = (i) => x0 + (i / 7) * (x1 - x0);
        const mapY = (v) => y0 - ((v - minY) / rangeY) * (y0 - y1);

        if (options.referenceValues) {
            const ref = options.referenceValues;
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.18)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < ref.length; i++) {
                const x = mapX(i);
                const y = mapY(ref[i]);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.20)';
            for (let i = 0; i < ref.length; i++) {
                ctx.beginPath();
                ctx.arc(mapX(i), mapY(ref[i]), 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // vertical sample guides
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const x = mapX(i);
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y1);
            ctx.lineTo(x + 0.5, y0);
            ctx.stroke();
        }
        ctx.restore();

        // main polyline
        ctx.save();
        ctx.strokeStyle = options.strokeStyle || '#56a0ff';
        ctx.lineWidth = options.lineWidth || 2.5;
        ctx.beginPath();
        for (let i = 0; i < values.length; i++) {
            const x = mapX(i);
            const y = mapY(values[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.fillStyle = options.pointFillStyle || '#ff8c3c';
        for (let i = 0; i < values.length; i++) {
            ctx.beginPath();
            ctx.arc(mapX(i), mapY(values[i]), 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawBasisWaveRow(ctx, w, h, basis, active, labelText) {
        ctx.save();
        ctx.fillStyle = '#1c1d21';
        ctx.fillRect(0, 0, w, h);

        const padL = 34;
        const padR = 10;
        const padT = 8;
        const padB = 8;

        const x0 = padL;
        const x1 = w - padR;
        const y0 = h - padB;
        const y1 = padT;
        const midY = (y0 + y1) / 2;
        const amp = (y0 - y1) * 0.38;

        const plotW = x1 - x0;
        const plotH = y0 - y1;

        // background guides
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;

        for (let i = 0; i < 8; i++) {
            const x = x0 + (i / 7) * plotW;
            ctx.beginPath();
            ctx.moveTo(x + 0.5, y1);
            ctx.lineTo(x + 0.5, y0);
            ctx.stroke();
        }

        // x axis / zero line
        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.beginPath();
        ctx.moveTo(x0, midY + 0.5);
        ctx.lineTo(x1, midY + 0.5);
        ctx.stroke();

        // y axis
        ctx.strokeStyle = 'rgba(255,255,255,0.28)';
        ctx.beginPath();
        ctx.moveTo(x0 + 0.5, y1);
        ctx.lineTo(x0 + 0.5, y0);
        ctx.stroke();

        const labelMatch = /k=(\d+)/.exec(labelText);
        const k = labelMatch ? parseInt(labelMatch[1], 10) : 0;
        const a = alpha(k, 8);

        const mapX = (t) => x0 + (t / 7) * plotW;
        const mapY = (v) => midY - (v / 0.5) * amp;

        // draw the actual continuous DCT basis curve:
        // phi_k(x) = alpha(k) * cos((pi / 8) * (x + 0.5) * k)
        ctx.strokeStyle = active ? 'rgba(86,160,255,0.98)' : 'rgba(255,255,255,0.22)';
        ctx.lineWidth = active ? 2.2 : 1.6;
        ctx.beginPath();

        const steps = Math.max(256, Math.round(plotW * 1.5));
        for (let s = 0; s <= steps; s++) {
            const t = (s / steps) * 7;
            const v = a * Math.cos((Math.PI / 8) * (t + 0.5) * k);
            const x = mapX(t);
            const y = mapY(v);

            if (s === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // overlay the 8 discrete sample values
        ctx.strokeStyle = active ? 'rgba(255,140,60,0.45)' : 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let n = 0; n < 8; n++) {
            const x = mapX(n);
            const y = mapY(basis[n]);
            if (n === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        ctx.fillStyle = active ? '#ff8c3c' : 'rgba(255,255,255,0.24)';
        for (let n = 0; n < 8; n++) {
            ctx.beginPath();
            ctx.arc(mapX(n), mapY(basis[n]), 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // label
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(labelText, 6, 4);

        ctx.restore();
    }

    function renderSqInput() {
        const container = document.getElementById('sq_input');
        if (!container) return;

        container.innerHTML = '';

        const values = getSelectedBlockValues();

        if (appMode === '1d') {
            const wrap = document.createElement('div');

            const canvas = createHiDPICanvas(
                Math.max(10, rect.width - 20),
                Math.max(10, rect.height - 20)
            );
            canvas.className = 'plot-canvas';

            const ctx = canvas.getContext('2d');
            setupCanvas2D(ctx, canvas);

            if (values && values[0]) {
                drawSignalPlot(ctx, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1), values[0], {
                    minY: 0,
                    maxY: 255,
                    strokeStyle: '#56a0ff',
                    pointFillStyle: '#ff8c3c'
                });
            } else {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);
                drawAxes(ctx, w, h);

    function renderSqDct() {
        const container = document.getElementById('sq_dct');
        if (!container) return;

        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'sample-grid-wrap';

        const grid = document.createElement('div');
        grid.className = `sample-grid ${appMode === '2d' ? 'mode-2d' : 'mode-1d'}`;

        const coeffs = getSelectedDctCoefficients();

        if (!coeffs) {
            if (appMode === '2d') {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = 'repeat(8, 1fr)';
                for (let i = 0; i < 64; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);
                }
            } else {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = '1fr';
                for (let i = 0; i < 8; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);
                }
            }

            wrap.appendChild(grid);
            container.appendChild(wrap);
            return;
        }

        const flat = appMode === '2d'
            ? coeffs.flatMap(row => Array.from(row))
            : Array.from(coeffs[0]);

        const maxAbs = Math.max(...flat.map(v => Math.abs(v)), 1);

        if (appMode === '2d') {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = 'repeat(8, 1fr)';

            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const active = isCoefficientActive(x, y);
                    const raw = coeffs[y][x];
                    const shown = active ? raw : 0;

                    const cell = document.createElement('div');
                    cell.className = 'sample-cell';
                    cell.textContent = Math.round(shown);

                    const style = getDctCellStyle(raw, maxAbs);
                    cell.style.background = style.background;
                    cell.style.color = style.color;
                    cell.style.opacity = active ? '1' : '0.22';

                    grid.appendChild(cell);
                }
            }
        } else {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = '1fr';

            for (let x = 0; x < 8; x++) {
                const active = isCoefficientActive(x, 0);
                const raw = coeffs[0][x];
                const shown = active ? raw : 0;

                const cell = document.createElement('div');
                cell.className = 'sample-cell';
                cell.textContent = Math.round(shown);

                const style = getDctCellStyle(raw, maxAbs);
                cell.style.background = style.background;
                cell.style.color = style.color;
                cell.style.opacity = active ? '1' : '0.22';

                grid.appendChild(cell);
            }
        }

        wrap.appendChild(grid);
        container.appendChild(wrap);
    }

    function renderSqBaseFunctions() {
        const container = document.getElementById('sq_base_functions');
        if (!container) return;

        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.style.position = 'absolute';
        wrap.style.inset = '10px';
        wrap.style.boxSizing = 'border-box';

        if (appMode === '2d') {
            wrap.style.display = 'grid';
            wrap.style.gap = '4px';
            wrap.style.gridTemplateColumns = 'repeat(8, 1fr)';
            wrap.style.gridTemplateRows = 'repeat(8, 1fr)';

            for (let v = 0; v < 8; v++) {
                for (let u = 0; u < 8; u++) {
                    const basis = basisCache['2d'][v][u];
                    const active = isCoefficientActive(u, v);

                    const tile = document.createElement('div');
                    tile.style.display = 'grid';
                    tile.style.gridTemplateColumns = 'repeat(8, 1fr)';
                    tile.style.gridTemplateRows = 'repeat(8, 1fr)';
                    tile.style.gap = '0';
                    tile.style.outline = '1px solid #2a2d33';
                    tile.style.background = '#1c1d21';
                    tile.style.opacity = active ? '1' : '0.18';
                    tile.title = `u=${u}, v=${v}`;

                    for (let y = 0; y < 8; y++) {
                        for (let x = 0; x < 8; x++) {
                            const cell = document.createElement('div');
                            cell.style.aspectRatio = '1 / 1';
                            cell.style.background = getBasisCellStyle(basis[y][x], 0.25);
                            tile.appendChild(cell);
                        }
                    }

                    wrap.appendChild(tile);
                }
            }
        } else {
            const stack = document.createElement('div');
            stack.className = 'basis-1d-stack';

            for (let k = 0; k < 8; k++) {
                const basis = basisCache['1d'][k];
                const active = isCoefficientActive(k, 0);

                const row = document.createElement('div');
                row.className = 'basis-row';
                row.title = `k=${k}`;

                const rect = container.getBoundingClientRect();
                const innerW = Math.max(10, rect.width - 20);
                const innerH = Math.max(10, (rect.height - 20 - 7 * 4) / 8);

                const canvas = createHiDPICanvas(innerW, innerH);
                const ctx = canvas.getContext('2d');
                setupCanvas2D(ctx, canvas);

                drawBasisWaveRow(
                    ctx,
                    canvas.width / (window.devicePixelRatio || 1),
                    canvas.height / (window.devicePixelRatio || 1),
                    basis,
                    active,
                    `k=${k}`
                );

                row.appendChild(canvas);
                stack.appendChild(row);
            }

            container.appendChild(stack);
        }

        container.appendChild(wrap);
    }

    function renderSqIdct() {
        const container = document.getElementById('sq_idct');
        if (!container) return;

        container.innerHTML = '';

        const values = getReconstructedBlockValues();

        if (appMode === '1d') {
            const wrap = document.createElement('div');
            wrap.className = 'plot-wrap';

            const rect = container.getBoundingClientRect();
            const canvas = createHiDPICanvas(
                Math.max(10, rect.width - 20),
                Math.max(10, rect.height - 20)
            );
            canvas.className = 'plot-canvas';

            const ctx = canvas.getContext('2d');
            setupCanvas2D(ctx, canvas);

            const original = getSelectedBlockValues();
            const dctCoeffs = getSelectedDctCoefficients();

            if (values && values[0] && dctCoeffs && dctCoeffs[0]) {
                drawContinuousReconstructionPlot(
                    ctx,
                    canvas.width / (window.devicePixelRatio || 1),
                    canvas.height / (window.devicePixelRatio || 1),
                    dctCoeffs[0],
                    values[0],
                    {
                        minY: 0,
                        maxY: 255,
                        strokeStyle: '#56a0ff',
                        pointFillStyle: '#ff8c3c',
                        referenceValues: original && original[0] ? original[0] : null
                    }
                );
            } else {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);
                drawAxes(ctx, w, h);
            }

            wrap.appendChild(canvas);
            container.appendChild(wrap);
            return;
        }

        const wrap = document.createElement('div');
        wrap.className = 'sample-grid-wrap';

        const grid = document.createElement('div');
        grid.className = 'sample-grid mode-2d';

        if (!values) {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = 'repeat(8, 1fr)';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'sample-cell empty';
                grid.appendChild(cell);
            }
            wrap.appendChild(grid);
            container.appendChild(wrap);
            return;
        }

        grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
        grid.style.gridTemplateRows = 'repeat(8, 1fr)';

        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                const v = values[y][x];
                const cell = document.createElement('div');
                cell.className = 'sample-cell';
                cell.textContent = v;
                cell.style.background = `rgb(${v}, ${v}, ${v})`;
                cell.style.color = getTextColorForValue(v);
                grid.appendChild(cell);
            }
        }

        wrap.appendChild(grid);
        container.appendChild(wrap);
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('left_panel_open_btn')?.addEventListener('click', openLeftPanel);
        document.getElementById('backdrop')?.addEventListener('click', closeLeftPanel);

        buildDctTables();
        buildBasisCache();

        handleResize();
        setupInteractions();
        buildControls();
        setupModeSwitch();

        const baseImage = document.getElementById('base_image');
        baseImage.addEventListener('load', loadCurrentImageIntoViewer);

        const images = ['25', '30', '33', '44', '76', '91'];
        const imageChooser = document.getElementById('gallery');

        for (const imgSrc of images) {
            const img = document.createElement('img');
            img.src = `jpeg/${imgSrc}.jpg`;
            img.addEventListener('click', function() {
                loadImage(`jpeg/${imgSrc}.jpg`);
                closeLeftPanel();
            });
            imageChooser.append(img);
        }

        const firstImage = imageChooser.querySelector('img');
        if (firstImage) firstImage.click();

        renderSqBaseFunctions();
        updateCoefficientsKnobForMode();
        renderSqIdct();
        scheduleRender();
    });
</script>
