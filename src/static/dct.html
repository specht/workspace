<script>
    let isLeftPanelOpen = false;

    let hpadding = 32;
    let vpadding = 10;
    let margin = 10;

    let width = 1;
    let height = 1;

    let appMode = '1d'; // '1d' or '2d'

    const basisCache = {
        '1d': null,
        '2d': null
    };

    const selectionState = {
        hover: null,
        selected: null
    };

    let knobs = [];

    const viewState = {
        zoom: 1,
        minZoom: 1,
        maxZoom: 64,
        cx: 0,
        cy: 0
    };

    const pointers = new Map();
    let gesture = null;
    let renderQueued = false;

    const viewIds = ['source', 'channel_view', 'reconstructed_view'];

    const buffers = {
        source: document.createElement('canvas'),
        channel_view: document.createElement('canvas'),
        reconstructed_view: document.createElement('canvas')
    };

    const bufferContexts = {
        source: buffers.source.getContext('2d', { willReadFrequently: true }),
        channel_view: buffers.channel_view.getContext('2d', { willReadFrequently: true }),
        reconstructed_view: buffers.reconstructed_view.getContext('2d', { willReadFrequently: true })
    };

    const visibleContexts = {};

    let currentChannel = 1; // 1=Y, 2=Cb, 3=Cr

    let coefficientsKnob = null;
    let coefficientCount = 64;
    let zigZagOrderCache = null;

    function getLeftPanelWidth() {
        const panel = document.getElementById('left_panel');
        return panel ? panel.getBoundingClientRect().width : 0;
    }

    function openLeftPanel() {
        document.getElementById('left_panel_open_btn').style.display = 'none';
        document.getElementById('backdrop').classList.add('visible');

        const panel = document.getElementById('left_panel');
        if (!panel) return;

        isLeftPanelOpen = true;
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');

        const width = getLeftPanelWidth();
        document.documentElement.style.setProperty('--side-panel-offset', `${width}px`);
    }

    function closeLeftPanel() {
        document.getElementById('left_panel_open_btn').style.display = 'block';
        document.getElementById('backdrop').classList.remove('visible');

        const panel = document.getElementById('left_panel');
        if (!panel) return;

        isLeftPanelOpen = false;
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');

        document.documentElement.style.setProperty('--side-panel-offset', `0px`);
    }

    function getSelectionSize() {
        return appMode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };
    }

    function clampSelectionOrigin(x, y, blockW, blockH) {
        return {
            x: Math.max(0, Math.min(width - blockW, x)),
            y: Math.max(0, Math.min(height - blockH, y))
        };
    }

    function getSelectionAtImagePoint(ix, iy) {
        if (!width || !height) return null;

        const { w: blockW, h: blockH } = getSelectionSize();

        const px = Math.floor(ix - blockW / 2 + 0.5);
        const py = Math.floor(iy - blockH / 2 + 0.5);

        return clampSelectionOrigin(px, py, blockW, blockH);
    }

    function drawSelectionOverlay(viewId, ctx, visibleCanvas) {
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;
        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        function drawPixelGrid(rx, ry, rw, rh, blockW, blockH, color, alpha) {
            if (viewState.zoom < 8) return;

            ctx.save();
            ctx.beginPath();

            for (let i = 1; i < blockW; i++) {
                const gx = rx + i * scale;
                ctx.moveTo(gx + 0.5, ry);
                ctx.lineTo(gx + 0.5, ry + rh);
            }

            for (let j = 1; j < blockH; j++) {
                const gy = ry + j * scale;
                ctx.moveTo(rx, gy + 0.5);
                ctx.lineTo(rx + rw, gy + 0.5);
            }

            ctx.lineWidth = 1;
            ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            ctx.stroke();
            ctx.restore();
        }

        function drawRect(sel, opts) {
            if (!sel) return;

            const { w: blockW, h: blockH } = getSelectionSize();

            const rx = Math.round((sel.x - sx) * scale);
            const ry = Math.round((sel.y - sy) * scale);
            const rw = Math.round(blockW * scale);
            const rh = Math.round(blockH * scale);

            ctx.save();

            if (opts.dash) {
                ctx.setLineDash(opts.dash);
            } else {
                ctx.setLineDash([]);
            }

            if (opts.fill) {
                ctx.fillStyle = opts.fill;
                ctx.fillRect(rx, ry, rw, rh);
            }

            ctx.lineWidth = opts.lineWidth;
            ctx.strokeStyle = opts.stroke;
            ctx.strokeRect(rx + 0.5, ry + 0.5, rw, rh);

            drawPixelGrid(rx, ry, rw, rh, blockW, blockH, opts.gridColor, opts.gridAlpha);

            ctx.restore();
        }

        drawRect(selectionState.hover, {
            fill: 'rgba(0, 200, 255, 0.12)',
            stroke: 'rgba(0, 200, 255, 0.95)',
            lineWidth: 1,
            dash: [5, 3],
            gridColor: { r: 0, g: 200, b: 255 },
            gridAlpha: 0.45
        });

        drawRect(selectionState.selected, {
            fill: 'rgba(0, 200, 255, 0.12)',
            stroke: 'rgba(0, 200, 255, 1.0)',
            lineWidth: 2,
            dash: null,
            gridColor: { r: 0, g: 200, b: 255 },
            gridAlpha: 0.45
        });
    }

    function getCanvasDisplaySize(canvas) {
        const dpr = window.devicePixelRatio || 1;
        return {
            w: canvas.width / dpr,
            h: canvas.height / dpr
        };
    }

    function getFitScale(canvas) {
        if (!width || !height) return 1;
        const size = getCanvasDisplaySize(canvas);
        return Math.min(size.w / width, size.h / height);
    }

    function getEffectiveScale(canvas) {
        return getFitScale(canvas) * viewState.zoom;
    }

    function resizeVisibleCanvases() {
        viewIds.forEach(id => {
            const container = document.getElementById(id);
            const canvas = container.querySelector('canvas');
            const rect = container.getBoundingClientRect();

            const dpr = window.devicePixelRatio || 1;
            const displayWidth = Math.max(1, Math.round(rect.width));
            const displayHeight = Math.max(1, Math.round(rect.height));

            canvas.width = Math.round(displayWidth * dpr);
            canvas.height = Math.round(displayHeight * dpr);
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
        });
    }

    function updateZoomLimits() {
        viewState.minZoom = 1;
        viewState.maxZoom = 64;
        viewState.zoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom || 1));
    }

    function resetView() {
        viewState.cx = width / 2;
        viewState.cy = height / 2;
        updateZoomLimits();
        viewState.zoom = 1;
        clampView();
        renderAll();
    }

    function clampView() {
        let maxHalfW = 0;
        let maxHalfH = 0;

        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            if (!canvas) return;

            const size = getCanvasDisplaySize(canvas);
            const scale = getEffectiveScale(canvas);

            const halfW = size.w / (2 * scale);
            const halfH = size.h / (2 * scale);

            maxHalfW = Math.max(maxHalfW, halfW);
            maxHalfH = Math.max(maxHalfH, halfH);
        });

        if (maxHalfW * 2 >= width) {
            viewState.cx = width / 2;
        } else {
            viewState.cx = Math.max(maxHalfW, Math.min(width - maxHalfW, viewState.cx));
        }

        if (maxHalfH * 2 >= height) {
            viewState.cy = height / 2;
        } else {
            viewState.cy = Math.max(maxHalfH, Math.min(height - maxHalfH, viewState.cy));
        }
    }

    function renderView(viewId) {
        const visibleCanvas = document.querySelector(`#${viewId} canvas`);
        if (!visibleCanvas) return;

        const ctx = visibleContexts[viewId];
        const srcCanvas = buffers[viewId];
        const dpr = window.devicePixelRatio || 1;
        const size = getCanvasDisplaySize(visibleCanvas);
        const dw = size.w;
        const dh = size.h;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, dw, dh);

        if (!srcCanvas || !srcCanvas.width || !srcCanvas.height) return;

        const scale = getEffectiveScale(visibleCanvas);
        const sw = dw / scale;
        const sh = dh / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        ctx.imageSmoothingEnabled = !(viewState.zoom > 4);
        ctx.imageSmoothingQuality = 'low';

        ctx.drawImage(
            srcCanvas,
            sx, sy, sw, sh,
            0, 0, dw, dh
        );

        drawSelectionOverlay(viewId, ctx, visibleCanvas);
    }

    function renderAll() {
        for (const id of viewIds) {
            renderView(id);
        }
    }

    function scheduleRender() {
        if (renderQueued) return;
        renderQueued = true;
        requestAnimationFrame(() => {
            renderQueued = false;
            renderAll();
        });
    }

    function getSelectionCenter(sel, mode = appMode) {
        if (!sel) return null;

        const size = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        return {
            x: sel.x + size.w / 2,
            y: sel.y + size.h / 2
        };
    }

    function getSelectionFromCenter(cx, cy, mode = appMode) {
        const size = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        return clampSelectionOrigin(
            Math.floor(cx - size.w / 2),
            Math.floor(cy - size.h / 2),
            size.w,
            size.h
        );
    }

    function updateHoverSelectionFromPointer(canvas, clientX, clientY) {
        const p = screenToImage(canvas, clientX, clientY);
        selectionState.hover = getSelectionAtImagePoint(p.x, p.y);
        scheduleRender();
    }

    function clearHoverSelection() {
        if (!selectionState.hover) return;
        selectionState.hover = null;
        scheduleRender();
    }

    function commitHoverSelection() {
        if (!selectionState.hover) return;
        selectionState.selected = { ...selectionState.hover };
        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
        scheduleRender();
    }

    function handleResize() {
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;

        const scaleFactor = Math.min(1.0, 1060.0 / windowHeight);
        const knobW = 100 * scaleFactor;

        const canvasW = (windowWidth - 2 * margin - 2 * knobW - 4 * hpadding) / 3;
        const canvasH = (windowHeight - 2 * margin - 2 * vpadding) / 3;

        let div = document.getElementById('source');
        div.style.left = `${margin}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('channel_chooser');
        div.style.left = `${margin + canvasW + hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${knobW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('coefficients_chooser');
        div.style.left = `${margin + canvasW * 2 + hpadding * 3 + knobW}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${knobW}px`;
        div.style.height = `${canvasH}px`;

        div = document.getElementById('channel_view');
        div.style.left = `${margin + canvasW + knobW + 2 * hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

            div = document.getElementById('reconstructed_view');
        div.style.left = `${margin + 2 * canvasW + 2 * knobW + 4 * hpadding}px`;
        div.style.top = `${margin + vpadding}px`;
        div.style.width = `${canvasW}px`;
        div.style.height = `${canvasH}px`;

        let squareCount = 4;
        let squareSize = (windowWidth - 2 * margin - (squareCount - 1) * hpadding) / squareCount;

        div = document.getElementById('sq_input');
        div.style.left = `${margin}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_dct');
        div.style.left = `${margin + squareSize + hpadding}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_base_functions');
        div.style.left = `${margin + 2 * (squareSize + hpadding)}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        div = document.getElementById('sq_idct');
        div.style.left = `${margin + 3 * (squareSize + hpadding)}px`;
        div.style.top = `${margin + canvasH + 2 * vpadding}px`;
        div.style.width = `${squareSize}px`;
        div.style.height = `${squareSize}px`;

        resizeVisibleCanvases();
        updateZoomLimits();
        clampView();
        scheduleRender();
    }

    function loadImage(src) {
        document.getElementById('base_image').src = src;
    }

    function clampByte(v) {
        return Math.max(0, Math.min(255, Math.round(v)));
    }

    function rebuildChannelBuffer() {
        const srcCanvas = buffers.source;
        const srcCtx = bufferContexts.source;
        const dstCanvas = buffers.channel_view;
        const dstCtx = bufferContexts.channel_view;

        if (!srcCanvas.width || !srcCanvas.height) return;

        dstCanvas.width = srcCanvas.width;
        dstCanvas.height = srcCanvas.height;

        const w = srcCanvas.width;
        const h = srcCanvas.height;

        const src = srcCtx.getImageData(0, 0, w, h);
        const dst = dstCtx.createImageData(w, h);

        const s = src.data;
        const d = dst.data;

        for (let i = 0; i < s.length; i += 4) {
            const r = s[i];
            const g = s[i + 1];
            const b = s[i + 2];

            const y  =  0.299 * r + 0.587 * g + 0.114 * b;
            const cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
            const cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;

            let v = y;
            if (currentChannel === 2) v = cb;
            if (currentChannel === 3) v = cr;

            v = clampByte(v);

            d[i] = v;
            d[i + 1] = v;
            d[i + 2] = v;
            d[i + 3] = 255;
        }

        dstCtx.putImageData(dst, 0, 0);
        document.getElementById('channel_label').textContent = `${['Y', 'Cb', 'Cr'][currentChannel - 1]} Channel`;
        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
    }

    function loadCurrentImageIntoViewer() {
        const baseImage = document.getElementById('base_image');

        width = baseImage.naturalWidth;
        height = baseImage.naturalHeight;

        Object.values(buffers).forEach(c => {
            c.width = width;
            c.height = height;
        });

        const ctx = bufferContexts.source;
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(baseImage, 0, 0, width, height);

        selectionState.hover = null;
        selectionState.selected = null;

        rebuildChannelBuffer();
        renderSqInput();
        renderSqDct();
        renderSqIdct();
        resetView();
    }

    function dctBasis1d(k, N = 8) {
        const a = alpha(k, N);
        const out = [];

        for (let n = 0; n < N; n++) {
            out.push(a * Math.cos((Math.PI / N) * (n + 0.5) * k));
        }

        return out;
    }

    function dctBasis2d(u, v, W = 8, H = 8) {
        const au = alpha(u, W);
        const av = alpha(v, H);

        const out = Array.from({ length: H }, () => new Array(W).fill(0));

        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                out[y][x] =
                    au * av *
                    Math.cos((Math.PI / W) * (x + 0.5) * u) *
                    Math.cos((Math.PI / H) * (y + 0.5) * v);
            }
        }

        return out;
    }

    function buildBasisCache() {
        basisCache['1d'] = [];
        for (let k = 0; k < 8; k++) {
            basisCache['1d'].push(dctBasis1d(k, 8));
        }

        basisCache['2d'] = [];
        for (let v = 0; v < 8; v++) {
            const row = [];
            for (let u = 0; u < 8; u++) {
                row.push(dctBasis2d(u, v, 8, 8));
            }
            basisCache['2d'].push(row);
        }
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function getDctCellStyle(v, maxAbs) {
        const base = { r: 28, g: 29, b: 33 }; // #1c1d21

        if (maxAbs < 1e-9) {
            return {
                background: `rgb(${base.r}, ${base.g}, ${base.b})`,
                color: '#f5f5f5'
            };
        }

        const t = Math.min(1, Math.abs(v) / maxAbs);

        // soften dynamic range (prevents DC domination)
        const s = Math.pow(t, 0.6);

        // target colors (not full intensity — keep it tasteful)
        const warm = { r: 255, g: 140, b: 60 };   // orange
        const cool = { r: 80,  g: 160, b: 255 };  // blue

        const target = v > 0 ? warm : v < 0 ? cool : base;

        const r = Math.round(lerp(base.r, target.r, s));
        const g = Math.round(lerp(base.g, target.g, s));
        const b = Math.round(lerp(base.b, target.b, s));

        const bg = `rgb(${r}, ${g}, ${b})`;

        // luminance-based text color
        const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

        return {
            background: bg,
            color: luminance > 140 ? '#111' : '#f5f5f5'
        };
    }

    function getBasisCellStyle(v, maxAbs = 1) {
        const base = { r: 28, g: 29, b: 33 }; // #1c1d21
        const warm = { r: 255, g: 140, b: 60 };
        const cool = { r: 80, g: 160, b: 255 };

        const t = Math.min(1, Math.abs(v) / maxAbs);
        const s = Math.pow(t, 0.9);

        const target = v > 0 ? warm : v < 0 ? cool : base;

        const r = Math.round(lerp(base.r, target.r, s));
        const g = Math.round(lerp(base.g, target.g, s));
        const b = Math.round(lerp(base.b, target.b, s));

        return `rgb(${r}, ${g}, ${b})`;
    }

    function alpha(k, n) {
        return k === 0 ? Math.sqrt(1 / n) : Math.sqrt(2 / n);
    }

    function dct1d(vec) {
        const N = vec.length;
        const out = new Array(N).fill(0);

        for (let k = 0; k < N; k++) {
            let sum = 0;
            for (let n = 0; n < N; n++) {
                sum += vec[n] * Math.cos((Math.PI / N) * (n + 0.5) * k);
            }
            out[k] = alpha(k, N) * sum;
        }

        return out;
    }

    function dct2d(block) {
        const H = block.length;
        const W = block[0].length;

        const out = Array.from({ length: H }, () => new Array(W).fill(0));

        for (let v = 0; v < H; v++) {
            for (let u = 0; u < W; u++) {
                let sum = 0;

                for (let y = 0; y < H; y++) {
                    for (let x = 0; x < W; x++) {
                        sum += block[y][x]
                            * Math.cos((Math.PI / W) * (x + 0.5) * u)
                            * Math.cos((Math.PI / H) * (y + 0.5) * v);
                    }
                }

                out[v][u] = alpha(u, W) * alpha(v, H) * sum;
            }
        }

        return out;
    }

    function getSelectedBlockShiftedValues() {
        const values = getSelectedBlockValues();
        if (!values) return null;

        // JPEG-style level shift: center samples around zero before DCT
        return values.map(row => row.map(v => v - 128));
    }

    function getSelectedDctCoefficients() {
        const shifted = getSelectedBlockShiftedValues();
        if (!shifted) return null;

        if (appMode === '2d') {
            return dct2d(shifted);
        }

        return [dct1d(shifted[0])];
    }

    function reconstructBlockFromValues(values, mode = appMode, count = coefficientCount) {
        if (!values) return null;

        const shifted = values.map(row => row.map(v => v - 128));

        if (mode === '1d') {
            const coeffs = dct1d(shifted[0]);
            const truncated = new Array(8).fill(0);

            for (let i = 0; i < Math.min(count, 8); i++) {
                truncated[i] = coeffs[i];
            }

            const reconstructed = idct1d(truncated).map(v => clampByte(v + 128));
            return [reconstructed];
        }

        const coeffs = dct2d(shifted);
        const truncated = truncateCoefficients(coeffs, count, '2d');
        const reconstructed = idct2d(truncated).map(row => row.map(v => clampByte(v + 128)));
        return reconstructed;
    }

    function setPixelInImageData(data, w, x, y, v) {
        const i = (y * w + x) * 4;
        data[i] = v;
        data[i + 1] = v;
        data[i + 2] = v;
        data[i + 3] = 255;
    }

    function rebuildReconstructedBuffer() {
        const srcCanvas = buffers.channel_view;
        const srcCtx = bufferContexts.channel_view;
        const dstCanvas = buffers.reconstructed_view;
        const dstCtx = bufferContexts.reconstructed_view;

        if (!srcCanvas.width || !srcCanvas.height) return;

        const w = srcCanvas.width;
        const h = srcCanvas.height;

        dstCanvas.width = w;
        dstCanvas.height = h;

        const src = srcCtx.getImageData(0, 0, w, h);
        const dst = dstCtx.createImageData(w, h);

        const blockW = 8;
        const blockH = appMode === '1d' ? 1 : 8;

        // Anchor the reconstruction grid to the selected block if present.
        // Fallback to the old origin when nothing is selected yet.
        const sel = selectionState.selected;
        const anchorX = sel ? sel.x : 0;
        const anchorY = sel ? sel.y : 0;

        // Find the first block origin at or before the image bounds so that
        // the infinite block lattice aligned to the selected block covers
        // the full image.
        let startX = anchorX;
        while (startX > 0) startX -= blockW;

        let startY = anchorY;
        while (startY > 0) startY -= blockH;

        for (let y0 = startY; y0 < h; y0 += blockH) {
            for (let x0 = startX; x0 < w; x0 += blockW) {
                const block = [];

                for (let y = 0; y < blockH; y++) {
                    const row = [];
                    const sy = Math.max(0, Math.min(h - 1, y0 + y));

                    for (let x = 0; x < blockW; x++) {
                        const sx = Math.max(0, Math.min(w - 1, x0 + x));
                        const i = (sy * w + sx) * 4;
                        row.push(src.data[i]);
                    }

                    block.push(row);
                }

                const reconstructed = reconstructBlockFromValues(block, appMode, coefficientCount);

                for (let y = 0; y < blockH; y++) {
                    const dy = y0 + y;
                    if (dy < 0 || dy >= h) continue;

                    for (let x = 0; x < blockW; x++) {
                        const dx = x0 + x;
                        if (dx < 0 || dx >= w) continue;
                        setPixelInImageData(dst.data, w, dx, dy, reconstructed[y][x]);
                    }
                }
            }
        }

        dstCtx.putImageData(dst, 0, 0);
    }

    function screenToImage(canvas, clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;
        const sx = viewState.cx - sw / 2;
        const sy = viewState.cy - sh / 2;

        return {
            x: sx + (x / size.w) * sw,
            y: sy + (y / size.h) * sh
        };
    }

    function zoomAt(canvas, clientX, clientY, zoomFactor) {
        const before = screenToImage(canvas, clientX, clientY);
        const newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, viewState.zoom * zoomFactor));
        if (newZoom === viewState.zoom) return;

        viewState.zoom = newZoom;

        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = clientX - rect.left;
        const py = clientY - rect.top;

        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = before.x - ((px / size.w) - 0.5) * sw;
        viewState.cy = before.y - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function panByScreenDelta(canvas, dx, dy) {
        const scale = getEffectiveScale(canvas);
        viewState.cx -= dx / scale;
        viewState.cy -= dy / scale;
        clampView();
        scheduleRender();
    }

    function getTwoPointers() {
        const vals = Array.from(pointers.values());
        if (vals.length < 2) return null;
        return [vals[0], vals[1]];
    }

    function distance(a, b) {
        const dx = a.clientX - b.clientX;
        const dy = a.clientY - b.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function midpoint(a, b) {
        return {
            clientX: (a.clientX + b.clientX) / 2,
            clientY: (a.clientY + b.clientY) / 2
        };
    }

    function startGesture(canvas) {
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const anchor = screenToImage(canvas, mid.clientX, mid.clientY);

        gesture = {
            canvas,
            startDistance: distance(p1, p2),
            startZoom: viewState.zoom,
            anchorImageX: anchor.x,
            anchorImageY: anchor.y
        };
    }

    function updateGesture() {
        if (!gesture) return;
        const two = getTwoPointers();
        if (!two) return;

        const [p1, p2] = two;
        const mid = midpoint(p1, p2);
        const newDistance = distance(p1, p2);
        if (gesture.startDistance <= 0) return;

        let newZoom = gesture.startZoom * (newDistance / gesture.startDistance);
        newZoom = Math.max(viewState.minZoom, Math.min(viewState.maxZoom, newZoom));
        viewState.zoom = newZoom;

        const canvas = gesture.canvas;
        const rect = canvas.getBoundingClientRect();
        const size = getCanvasDisplaySize(canvas);
        const px = mid.clientX - rect.left;
        const py = mid.clientY - rect.top;
        const scale = getEffectiveScale(canvas);
        const sw = size.w / scale;
        const sh = size.h / scale;

        viewState.cx = gesture.anchorImageX - ((px / size.w) - 0.5) * sw;
        viewState.cy = gesture.anchorImageY - ((py / size.h) - 0.5) * sh;

        clampView();
        scheduleRender();
    }

    function attachInteractions(canvas) {
        const isSelectableCanvas =
            canvas.closest('#channel_view') !== null ||
            canvas.closest('#reconstructed_view') !== null;

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            zoomAt(canvas, e.clientX, e.clientY, factor);

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('dblclick', function(e) {
            e.preventDefault();
            zoomAt(canvas, e.clientX, e.clientY, 2);

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);

            pointers.set(e.pointerId, {
                pointerId: e.pointerId,
                clientX: e.clientX,
                clientY: e.clientY,
                prevX: e.clientX,
                prevY: e.clientY,
                downX: e.clientX,
                downY: e.clientY,
                moved: false
            });

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }

            if (pointers.size === 2) {
                startGesture(canvas);
            }
        });

        canvas.addEventListener('pointermove', function(e) {
            if (!pointers.has(e.pointerId)) {
                if (isSelectableCanvas) {
                    updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
                }
                return;
            }

            const p = pointers.get(e.pointerId);
            const dx = e.clientX - p.prevX;
            const dy = e.clientY - p.prevY;

            if (Math.abs(e.clientX - p.downX) > 3 || Math.abs(e.clientY - p.downY) > 3) {
                p.moved = true;
            }

            p.clientX = e.clientX;
            p.clientY = e.clientY;
            p.prevX = e.clientX;
            p.prevY = e.clientY;
            pointers.set(e.pointerId, p);

            if (pointers.size === 1 && p.moved) {
                panByScreenDelta(canvas, dx, dy);
            } else if (pointers.size >= 2) {
                updateGesture();
            }

            if (isSelectableCanvas) {
                updateHoverSelectionFromPointer(canvas, e.clientX, e.clientY);
            }
        });

        function endPointer(e) {
            const p = pointers.get(e.pointerId);
            const wasClick = p && !p.moved && pointers.size === 1;

            if (isSelectableCanvas && wasClick) {
                commitHoverSelection();
            }

            pointers.delete(e.pointerId);

            if (pointers.size < 2) {
                gesture = null;
            } else {
                startGesture(canvas);
            }
        }

        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);

        if (isSelectableCanvas) {
            canvas.addEventListener('pointerleave', clearHoverSelection);
        }
    }

    function setupInteractions() {
        viewIds.forEach(id => {
            const canvas = document.querySelector(`#${id} canvas`);
            visibleContexts[id] = canvas.getContext('2d');
            attachInteractions(canvas);
        });
    }

    function getCoefficientMax(mode = appMode) {
        return mode === '1d' ? 8 : 64;
    }

    function makeCoefficientTicks(max) {
        if (max === 8) {
            return [
                { value: 1, major: true },
                { value: 2, major: false },
                { value: 3, major: false },
                { value: 4, major: true },
                { value: 5, major: false },
                { value: 6, major: false },
                { value: 7, major: false },
                { value: 8, major: true }
            ];
        }

        return [
            { value: 1, major: true },
            { value: 4, major: false },
            { value: 8, major: true },
            { value: 12, major: false },
            { value: 16, major: true },
            { value: 20, major: false },
            { value: 24, major: true },
            { value: 28, major: false },
            { value: 32, major: true },
            { value: 36, major: false },
            { value: 40, major: true },
            { value: 44, major: false },
            { value: 48, major: true },
            { value: 52, major: false },
            { value: 56, major: true },
            { value: 60, major: false },
            { value: 64, major: true }
        ];
    }

    function updateCoefficientsKnobForMode() {
        const max = getCoefficientMax(appMode);
        coefficientCount = Math.min(coefficientCount, max);

        if (coefficientsKnob) {
            coefficientsKnob.updateOptions({
                min: 1,
                max,
                step: 1,
                value: coefficientCount,
                ticks: makeCoefficientTicks(max),
                bipolar: false,
                formatValue: (v) => v
            });
        }

        rebuildReconstructedBuffer();
        renderSqDct();
        renderSqBaseFunctions();
        renderSqIdct();
    }

    function getZigZagOrder8x8() {
        if (zigZagOrderCache) return zigZagOrderCache;

        const order = [];
        const N = 8;

        for (let s = 0; s <= 14; s++) {
            if (s % 2 === 0) {
                let y = Math.min(s, N - 1);
                let x = s - y;

                while (y >= 0 && x < N) {
                    order.push({ x, y });
                    x++;
                    y--;
                }
            } else {
                let x = Math.min(s, N - 1);
                let y = s - x;

                while (x >= 0 && y < N) {
                    order.push({ x, y });
                    x--;
                    y++;
                }
            }
        }

        zigZagOrderCache = order;
        return order;
    }

    function isCoefficientActive(x, y = 0, count = coefficientCount, mode = appMode) {
        if (mode === '1d') {
            return x < count;
        }

        const zigzag = getZigZagOrder8x8();
        for (let i = 0; i < count; i++) {
            if (zigzag[i].x === x && zigzag[i].y === y) return true;
        }
        return false;
    }

    function truncateCoefficients(coeffs, count = coefficientCount, mode = appMode) {
        if (!coeffs) return null;

        if (mode === '1d') {
            const out = [new Array(8).fill(0)];
            for (let i = 0; i < Math.min(count, 8); i++) {
                out[0][i] = coeffs[0][i];
            }
            return out;
        }

        const out = Array.from({ length: 8 }, () => new Array(8).fill(0));
        const zigzag = getZigZagOrder8x8();

        for (let i = 0; i < Math.min(count, 64); i++) {
            const { x, y } = zigzag[i];
            out[y][x] = coeffs[y][x];
        }

        return out;
    }

    function idct1d(coeffs) {
        const N = coeffs.length;
        const out = new Array(N).fill(0);

        for (let n = 0; n < N; n++) {
            let sum = 0;
            for (let k = 0; k < N; k++) {
                sum += alpha(k, N) * coeffs[k] * Math.cos((Math.PI / N) * (n + 0.5) * k);
            }
            out[n] = sum;
        }

        return out;
    }

    function idct2d(coeffs) {
        const H = coeffs.length;
        const W = coeffs[0].length;
        const out = Array.from({ length: H }, () => new Array(W).fill(0));

        for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
                let sum = 0;

                for (let v = 0; v < H; v++) {
                    for (let u = 0; u < W; u++) {
                        sum +=
                            alpha(u, W) * alpha(v, H) * coeffs[v][u] *
                            Math.cos((Math.PI / W) * (x + 0.5) * u) *
                            Math.cos((Math.PI / H) * (y + 0.5) * v);
                    }
                }

                out[y][x] = sum;
            }
        }

        return out;
    }

    function getTruncatedDctCoefficients() {
        const coeffs = getSelectedDctCoefficients();
        if (!coeffs) return null;
        return truncateCoefficients(coeffs, coefficientCount, appMode);
    }

    function getReconstructedBlockValues() {
        const truncated = getTruncatedDctCoefficients();
        if (!truncated) return null;

        let reconstructed;

        if (appMode === '1d') {
            reconstructed = [idct1d(truncated[0])];
        } else {
            reconstructed = idct2d(truncated);
        }

        return reconstructed.map(row =>
            row.map(v => clampByte(v + 128))
        );
    }

    window.addEventListener('resize', handleResize);

    function selectionToAnchor(sel, mode) {
        if (!sel) return null;

        if (mode === '1d') {
            return {
                x: sel.x,
                y: sel.y
            };
        }

        // In 2D, use the middle row as the anchor row.
        return {
            x: sel.x,
            y: sel.y + 3
        };
    }

    function selectionFromAnchor(anchor, mode) {
        if (!anchor) return null;

        const { w, h } = mode === '1d'
            ? { w: 8, h: 1 }
            : { w: 8, h: 8 };

        let x = anchor.x;
        let y = anchor.y;

        if (mode === '2d') {
            y = anchor.y - 3;
        }

        return clampSelectionOrigin(x, y, w, h);
    }

    function setAppMode(mode) {
        if (mode !== '1d' && mode !== '2d') return;
        if (appMode === mode) return;

        const prevMode = appMode;

        const selectedAnchor = selectionState.selected
            ? selectionToAnchor(selectionState.selected, prevMode)
            : null;

        const hoverAnchor = selectionState.hover
            ? selectionToAnchor(selectionState.hover, prevMode)
            : null;

        appMode = mode;

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });

        selectionState.selected = selectedAnchor
            ? selectionFromAnchor(selectedAnchor, mode)
            : null;

        selectionState.hover = hoverAnchor
            ? selectionFromAnchor(hoverAnchor, mode)
            : null;

        updateCoefficientsKnobForMode();

        rebuildReconstructedBuffer();
        renderSqInput();
        renderSqDct();
        renderSqBaseFunctions();
        renderSqIdct();
        scheduleRender();
    }

    function setupModeSwitch() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setAppMode(btn.dataset.mode);
            });
        });
    }

    function getSelectedBlockValues() {
        const sel = selectionState.selected || selectionState.hover;
        if (!sel) return null;

        const { w, h } = getSelectionSize();
        const ctx = bufferContexts.channel_view;
        const img = ctx.getImageData(sel.x, sel.y, w, h);
        const values = [];

        for (let row = 0; row < h; row++) {
            const line = [];
            for (let col = 0; col < w; col++) {
                const i = (row * w + col) * 4;
                line.push(img.data[i]); // grayscale, so R is enough
            }
            values.push(line);
        }

        return values;
    }

    function getTextColorForValue(v) {
        return v >= 140 ? '#111' : '#f5f5f5';
    }

    function renderSqInput() {
        const container = document.getElementById('sq_input');
        if (!container) return;

        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'sample-grid-wrap';

        const grid = document.createElement('div');
        grid.className = `sample-grid ${appMode === '2d' ? 'mode-2d' : 'mode-1d'}`;

        const values = getSelectedBlockValues();

        if (!values) {
            if (appMode === '2d') {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = 'repeat(8, 1fr)';

                for (let i = 0; i < 64; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);
                }
            } else {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = '1fr';

                for (let i = 0; i < 8; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);

        }

        if (appMode === '2d') {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = 'repeat(8, 1fr)';

            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {

                    const cell = document.createElement('div');
                    cell.className = 'sample-cell';
                    cell.textContent = v;
                    cell.style.background = `rgb(${v}, ${v}, ${v})`;
                    cell.style.color = getTextColorForValue(v);

            for (let x = 0; x < 8; x++) {

    function renderSqDct() {
        const container = document.getElementById('sq_dct');
        if (!container) return;

        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.className = 'sample-grid-wrap';

        const grid = document.createElement('div');
        grid.className = `sample-grid ${appMode === '2d' ? 'mode-2d' : 'mode-1d'}`;

        const coeffs = getSelectedDctCoefficients();
        const truncated = getTruncatedDctCoefficients();

        if (!coeffs || !truncated) {
            if (appMode === '2d') {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = 'repeat(8, 1fr)';
                for (let i = 0; i < 64; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);
                }
            } else {
                grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
                grid.style.gridTemplateRows = '1fr';
                for (let i = 0; i < 8; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'sample-cell empty';
                    grid.appendChild(cell);
                }
            }

            wrap.appendChild(grid);
            container.appendChild(wrap);
            return;
        }

        const flat = coeffs.flat();
        const maxAbs = Math.max(...flat.map(v => Math.abs(v)), 1);

        if (appMode === '2d') {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = 'repeat(8, 1fr)';

            for (let y = 0; y < 8; y++) {
                for (let x = 0; x < 8; x++) {
                    const active = isCoefficientActive(x, y);
                    const raw = coeffs[y][x];
                    const shown = active ? raw : 0;

                    const cell = document.createElement('div');
                    cell.className = 'sample-cell';
                    cell.textContent = Math.round(shown);

                    const style = getDctCellStyle(shown, maxAbs);
                    cell.style.background = style.background;
                    cell.style.color = style.color;
                    cell.style.opacity = active ? '1' : '0.2';

                    grid.appendChild(cell);
                }
            }
        } else {
            grid.style.gridTemplateColumns = 'repeat(8, 1fr)';
            grid.style.gridTemplateRows = '1fr';

            for (let x = 0; x < 8; x++) {
                const active = isCoefficientActive(x, 0);
                const raw = coeffs[0][x];
                const shown = active ? raw : 0;

                const cell = document.createElement('div');
                cell.className = 'sample-cell';
                cell.textContent = Math.round(shown);

                const style = getDctCellStyle(shown, maxAbs);
                cell.style.background = style.background;
                cell.style.color = style.color;
                cell.style.opacity = active ? '1' : '0.2';

                grid.appendChild(cell);
            }
        }

        wrap.appendChild(grid);
        container.appendChild(wrap);
    }

    function renderSqBaseFunctions() {
        const container = document.getElementById('sq_base_functions');
        if (!container) return;

        container.innerHTML = '';

        const wrap = document.createElement('div');
        wrap.style.position = 'absolute';
        wrap.style.inset = '10px';
        wrap.style.boxSizing = 'border-box';

        if (appMode === '2d') {
            wrap.style.display = 'grid';
            wrap.style.gap = '4px';
            wrap.style.gridTemplateColumns = 'repeat(8, 1fr)';
            wrap.style.gridTemplateRows = 'repeat(8, 1fr)';

            for (let v = 0; v < 8; v++) {
                for (let u = 0; u < 8; u++) {
                    const basis = basisCache['2d'][v][u];
                    const active = isCoefficientActive(u, v);

                    const tile = document.createElement('div');
                    tile.style.display = 'grid';
                    tile.style.gridTemplateColumns = 'repeat(8, 1fr)';
                    tile.style.gridTemplateRows = 'repeat(8, 1fr)';
                    tile.style.gap = '0';
                    tile.style.outline = '1px solid #2a2d33';
                    tile.style.background = '#1c1d21';
                    tile.style.opacity = active ? '1' : '0.18';
                    tile.title = `u=${u}, v=${v}`;

                    for (let y = 0; y < 8; y++) {
                        for (let x = 0; x < 8; x++) {
                            const cell = document.createElement('div');
                            cell.style.aspectRatio = '1 / 1';
                            cell.style.background = getBasisCellStyle(basis[y][x], 0.25);
                            tile.appendChild(cell);
                        }
                    }

                    wrap.appendChild(tile);
                }
            }
        } else {
            wrap.style.display = 'grid';
            wrap.style.gridTemplateColumns = 'repeat(8, 1fr)';
            wrap.style.gridTemplateRows = 'repeat(8, 1fr)';
            wrap.style.gap = '1px';
            wrap.style.background = '#2a2d33';
            wrap.style.outline = '1px solid #444';

            for (let k = 0; k < 8; k++) {
                const basis = basisCache['1d'][k];
                const active = isCoefficientActive(k, 0);

                for (let x = 0; x < 8; x++) {
                    const cell = document.createElement('div');
                    cell.style.aspectRatio = '1 / 1';
                    cell.style.background = getBasisCellStyle(basis[x], 0.5);
                    cell.style.opacity = active ? '1' : '0.18';
                    cell.title = `k=${k}, n=${x}, value=${basis[x].toFixed(3)}`;
                    wrap.appendChild(cell);
                }
            }
        }

        container.appendChild(wrap);
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('left_panel_open_btn')?.addEventListener('click', openLeftPanel);
        document.getElementById('backdrop')?.addEventListener('click', closeLeftPanel);

        handleResize();
        setupInteractions();
        buildControls();
        setupModeSwitch();

        const baseImage = document.getElementById('base_image');
        baseImage.addEventListener('load', loadCurrentImageIntoViewer);

        const images = ['25', '30', '33', '44', '76', '91'];
        const imageChooser = document.getElementById('gallery');

        for (const imgSrc of images) {
            const img = document.createElement('img');
            img.src = `jpeg/${imgSrc}.jpg`;
            img.addEventListener('click', function() {
                loadImage(`jpeg/${imgSrc}.jpg`);
                closeLeftPanel();
            });
            imageChooser.append(img);
        }

        const firstImage = imageChooser.querySelector('img');
        if (firstImage) firstImage.click();

        buildBasisCache();
        renderSqBaseFunctions();
        updateCoefficientsKnobForMode();
        renderSqIdct();
        scheduleRender();
    });
